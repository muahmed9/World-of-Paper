<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم ورق الكاشير - مولد الفواتير</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }
        
        /* إعدادات صارمة لقياس A4 لمنع طفرة الصفحة الثانية */
        .a4-wrapper {
            width: 210mm;
            height: 296mm; /* تحديد الارتفاع بدقة */
            background-color: white;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
            padding: 15mm;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* لمنع أي عنصر من تمديد الصفحة */
            position: relative;
        }

        /* تنسيقات الجدول المطابقة للصورة */
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border: 2px solid #94a3b8;
            border-radius: 8px;
        }
        .invoice-table th, .invoice-table td {
            border: 1px solid #cbd5e1;
            padding: 8px;
            text-align: center;
        }
        .invoice-table th {
            color: #64748b;
            font-weight: 700;
            padding: 12px 8px;
        }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            #app-root { display: block !important; padding: 0; }
            
            /* إزالة هوامش المتصفح الافتراضية لمنع الصفحة الإضافية */
            @page { 
                size: A4; 
                margin: 0; 
            }
            
            .a4-wrapper { 
                box-shadow: none; 
                margin: 0; 
                width: 100%; 
                height: 100vh;
                page-break-after: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const Icons = {
            Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        };

        function App() {
            const [invoice, setInvoice] = useState({
                invoiceNumber: `8743`,
                date: new Date().toISOString().split('T')[0],
                customerName: '',
                customerPhone: '',
                items: [{ id: '1', description: '', quantity: 1, price: 0 }],
                invoiceType: 'sale', // 'sale' = قائمة بيع | 'receipt' = سند قبض
                paymentStatus: 'paid' // 'paid' = واصل | 'unpaid' = غير مدفوع
            });

            // حساب المجموع الكلي
            const subtotal = useMemo(() => {
                return invoice.items.reduce((sum, item) => sum + (Number(item.quantity) * Number(item.price)), 0);
            }, [invoice.items]);

            // تكملة الصفوف الفارغة ليكون الجدول دائماً 7 صفوف كما في الصورة
            const paddedItems = useMemo(() => {
                const arr = [...invoice.items];
                while (arr.length < 7) {
                    arr.push({ id: Math.random().toString(), description: '', quantity: '', price: '', isEmpty: true });
                }
                return arr;
            }, [invoice.items]);

            const addItem = () => setInvoice(prev => ({ ...prev, items: [...prev.items, { id: Date.now().toString(), description: '', quantity: 1, price: 0 }] }));
            const removeItem = (id) => setInvoice(prev => ({ ...prev, items: prev.items.filter(item => item.id !== id) }));
            const updateItem = (id, field, value) => setInvoice(prev => ({ ...prev, items: prev.items.map(item => item.id === id ? { ...item, [field]: value } : item) }));

            return (
                <div id="app-root" className="min-h-screen flex flex-col md:flex-row gap-6 p-4 md:p-8">
                    
                    {/* ─── لوحة التحكم والإدخال (تختفي عند الطباعة) ─── */}
                    <div className="w-full md:w-[30%] space-y-6 no-print bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h1 className="text-xl font-bold border-b pb-4">إعدادات الفاتورة</h1>
                        
                        <div className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-500">نوع الوصل</label>
                                <select value={invoice.invoiceType} onChange={e => setInvoice(prev => ({...prev, invoiceType: e.target.value}))} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                    <option value="sale">قائمة بيع</option>
                                    <option value="receipt">سند قبض</option>
                                </select>
                            </div>

                            {invoice.invoiceType === 'sale' && (
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">حالة الدفع</label>
                                    <select value={invoice.paymentStatus} onChange={e => setInvoice(prev => ({...prev, paymentStatus: e.target.value}))} className="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                        <option value="paid">واصل</option>
                                        <option value="unpaid">غير مدفوع</option>
                                    </select>
                                </div>
                            )}

                            <input type="text" placeholder="رقم الوصل" value={invoice.invoiceNumber} onChange={e => setInvoice(prev => ({ ...prev, invoiceNumber: e.target.value }))} className="w-full p-2 border rounded-lg" />
                            <input type="date" value={invoice.date} onChange={e => setInvoice(prev => ({ ...prev, date: e.target.value }))} className="w-full p-2 border rounded-lg" />
                            <input type="text" placeholder="اسم الزبون" value={invoice.customerName} onChange={e => setInvoice(prev => ({ ...prev, customerName: e.target.value }))} className="w-full p-2 border rounded-lg" />
                            <input type="text" placeholder="رقم الهاتف" value={invoice.customerPhone} onChange={e => setInvoice(prev => ({ ...prev, customerPhone: e.target.value }))} className="w-full p-2 border rounded-lg" />
                        </div>

                        <div className="flex justify-between items-center pt-4 border-t">
                            <h2 className="font-bold">المواد</h2>
                            <button onClick={addItem} className="flex gap-1 px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm"><Icons.Plus/> إضافة</button>
                        </div>

                        <div className="space-y-2 max-h-[30vh] overflow-y-auto">
                            {invoice.items.map(item => (
                                <div key={item.id} className="flex gap-2 bg-slate-50 p-2 rounded border">
                                    <input placeholder="المادة" value={item.description} onChange={e => updateItem(item.id, 'description', e.target.value)} className="w-full p-1 border rounded text-sm" />
                                    <input type="number" placeholder="كمية" value={item.quantity} onChange={e => updateItem(item.id, 'quantity', e.target.value)} className="w-16 p-1 border rounded text-sm" />
                                    <input type="number" placeholder="سعر" value={item.price} onChange={e => updateItem(item.id, 'price', e.target.value)} className="w-20 p-1 border rounded text-sm" />
                                    <button onClick={() => removeItem(item.id)} className="text-red-500"><Icons.Trash/></button>
                                </div>
                            ))}
                        </div>

                        <button onClick={() => window.print()} className="w-full flex justify-center gap-2 py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg mt-4 hover:bg-slate-800">
                            <Icons.Printer /> طباعة الوصل
                        </button>
                    </div>

                    {/* ─── ورقة الطباعة A4 (المعاينة) ─── */}
                    <div className="w-full md:w-[70%] flex justify-center pb-10">
                        <div className="a4-wrapper">
                            
                            {/* 1. الهيدر: الشعار والاسم */}
                            <div className="flex justify-between items-start mb-6">
                                {/* الشعار: تم استخدام الملف المحلي logo.PNG */}
                                <img src="logo.PNG" alt="عالم ورق الكاشير" className="h-20 object-contain" />
                                
                                <div className="text-left mt-2">
                                    <h1 className="text-3xl font-black text-blue-900 tracking-tight" style={{fontFamily: "'Cairo', sans-serif"}}>عالم ورق الكاشير</h1>
                                    <p className="text-blue-700 font-bold text-sm mt-1">الجودة التي تستحقها تجارتكم</p>
                                </div>
                            </div>

                            {/* 2. عنوان الوصل */}
                            <div className="flex justify-center mb-6">
                                <div className="border-[3px] border-slate-700 rounded-xl px-10 py-1">
                                    <h2 className="text-2xl font-black text-slate-800">
                                        {invoice.invoiceType === 'receipt' ? 'سند قبض' : 
                                         invoice.invoiceType === 'sale' && invoice.paymentStatus === 'paid' ? 'قائمة بيع - واصل' : 'قائمة بيع'}
                                    </h2>
                                </div>
                            </div>

                            {/* 3. معلومات الزبون والفاتورة */}
                            <div className="flex justify-between items-start mb-6 px-2">
                                <div className="w-1/2 space-y-3">
                                    <div className="flex items-end">
                                        <span className="font-bold text-slate-700 ml-2">السيد/ة:</span>
                                        <span className="flex-1 border-b border-slate-400 font-bold text-lg text-center pb-1">{invoice.customerName}</span>
                                    </div>
                                    <div className="flex items-end">
                                        <span className="font-bold text-slate-700 ml-2">الهاتف:</span>
                                        <span className="flex-1 border-b border-slate-400 font-bold text-lg text-center pb-1 tracking-wider" dir="ltr">{invoice.customerPhone}</span>
                                    </div>
                                </div>
                                <div className="w-1/3 space-y-3 text-left">
                                    <div className="flex justify-end items-end">
                                        <span className="font-bold text-slate-700 ml-3">رقم الوصل:</span>
                                        <span className="font-bold text-lg">{invoice.invoiceNumber}</span>
                                    </div>
                                    <div className="flex justify-end items-end">
                                        <span className="font-bold text-slate-700 ml-3">التاريخ:</span>
                                        <span className="font-bold text-lg">{invoice.date}</span>
                                    </div>
                                </div>
                            </div>

                            {/* 4. الجدول */}
                            <table className="invoice-table">
                                <thead>
                                    <tr className="bg-slate-50">
                                        <th className="w-10">#</th>
                                        <th className="w-1/2">المادة</th>
                                        <th className="w-24">الكمية</th>
                                        <th className="w-32">السعر</th>
                                        <th className="w-32">المجموع</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {paddedItems.map((item, index) => (
                                        <tr key={index} className="h-10">
                                            <td className="font-bold text-slate-500">{!item.isEmpty ? index + 1 : ''}</td>
                                            <td className="font-bold text-slate-800 text-right pr-4">{item.description}</td>
                                            <td className="font-bold text-slate-800">{item.quantity}</td>
                                            <td className="font-bold text-slate-800">{item.price ? Number(item.price).toLocaleString() : ''}</td>
                                            <td className="font-bold text-slate-800">
                                                {!item.isEmpty && item.quantity && item.price ? (Number(item.quantity) * Number(item.price)).toLocaleString() : ''}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                            {/* 5. المجموع والملاحظات */}
                            <div className="flex justify-between items-end mt-4 px-2">
                                <div className="text-right">
                                    <p className="font-bold text-slate-800">ملاحظات:</p>
                                    <p className="text-sm font-bold text-slate-500">البضاعة المباعة لا ترد ولا تستبدل بعد 24 ساعة.</p>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-50 px-6 py-2 rounded-lg border border-slate-200">
                                    <span className="font-bold text-slate-500">المجموع الكلي:</span>
                                    <span className="text-2xl font-black text-slate-800">{subtotal.toLocaleString()} د.ع</span>
                                </div>
                            </div>

                            {/* دفع المحتوى الباقي للأسفل لضمان ثبات التواقيع */}
                            <div className="flex-grow"></div>

                            {/* 6. التواقيع والفوتر */}
                            <div>
                                <div className="flex justify-between px-12 mb-8 mt-12">
                                    <div className="text-center w-40">
                                        <div className="border-b-2 border-slate-300 h-8 mb-2"></div>
                                        <p className="font-bold text-slate-500 text-sm">توقيع المستلم</p>
                                    </div>
                                    <div className="text-center w-40">
                                        <div className="border-b-2 border-slate-300 h-8 mb-2"></div>
                                        <p className="font-bold text-slate-500 text-sm">توقيع المحاسب</p>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center border-t border-slate-200 pt-4 text-sm font-bold text-slate-600">
                                    <div className="flex items-center gap-2" dir="ltr">
                                        <span>📞</span> +964 786 848 3823
                                    </div>
                                    <div className="flex items-center gap-2 text-red-500">
                                        بغداد - زيونة <span>📍</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
