<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم ورق الكاشير - مولد الفواتير</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            #invoice-preview { box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // تعريف الأيقونات كـ SVG ثابتة لضمان العمل بدون مكتبات خارجية
        const Icons = {
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Printer: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        };

        const BUSINESS_INFO = {
            name: "عالم ورق الكاشير",
            slogan: "الجودة التي تستحقها تجارتكم",
            address: "بغداد - زيونة",
            phone: "+964 786 848 3823",
        };

        function App() {
            const [invoice, setInvoice] = useState({
                invoiceNumber: `INV-${Date.now().toString().slice(-6)}`,
                date: new Date().toISOString().split('T')[0],
                customerName: '',
                customerPhone: '',
                items: [{ id: '1', description: '', quantity: 1, price: 0 }],
                notes: '',
            });

            const subtotal = useMemo(() => {
                return invoice.items.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            }, [invoice.items]);

            const addItem = () => {
                setInvoice(prev => ({
                    ...prev,
                    items: [...prev.items, { id: Math.random().toString(36).substr(2, 9), description: '', quantity: 1, price: 0 }]
                }));
            };

            const removeItem = (id) => {
                if (invoice.items.length === 1) return;
                setInvoice(prev => ({
                    ...prev,
                    items: prev.items.filter(item => item.id !== id)
                }));
            };

            const updateItem = (id, field, value) => {
                setInvoice(prev => ({
                    ...prev,
                    items: prev.items.map(item => item.id === id ? { ...item, [field]: value } : item)
                }));
            };

            return (
                <div className="min-h-screen flex flex-col lg:flex-row gap-8 p-4 md:p-8 max-w-7xl mx-auto">
                    {/* قسم المدخلات */}
                    <div className="w-full lg:w-1/2 space-y-6 no-print">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                            <h1 className="text-xl font-bold text-slate-800 border-b pb-4">تفاصيل القائمة</h1>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">رقم القائمة</label>
                                    <input type="text" value={invoice.invoiceNumber} onChange={e => setInvoice(prev => ({ ...prev, invoiceNumber: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">التاريخ</label>
                                    <input type="date" value={invoice.date} onChange={e => setInvoice(prev => ({ ...prev, date: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                                <input type="text" placeholder="اسم الزبون" value={invoice.customerName} onChange={e => setInvoice(prev => ({ ...prev, customerName: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200" />
                                <input type="text" placeholder="رقم الهاتف" value={invoice.customerPhone} onChange={e => setInvoice(prev => ({ ...prev, customerPhone: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200" />
                            </div>

                            <div className="flex items-center justify-between pt-4">
                                <h2 className="font-bold">المواد</h2>
                                <button onClick={addItem} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors">
                                    <Icons.Plus /> إضافة مادة
                                </button>
                            </div>

                            <div className="space-y-3">
                                {invoice.items.map((item) => (
                                    <div key={item.id} className="flex gap-2 p-3 bg-slate-50 rounded-xl border border-slate-100 items-center">
                                        <input type="text" placeholder="وصف المادة" value={item.description} onChange={e => updateItem(item.id, 'description', e.target.value)} className="flex-1 px-3 py-2 border rounded-lg" />
                                        <input type="number" placeholder="الكمية" value={item.quantity} onChange={e => updateItem(item.id, 'quantity', Number(e.target.value))} className="w-20 px-3 py-2 border rounded-lg" />
                                        <input type="number" placeholder="السعر" value={item.price} onChange={e => updateItem(item.id, 'price', Number(e.target.value))} className="w-24 px-3 py-2 border rounded-lg" />
                                        <button onClick={() => removeItem(item.id)} className="text-slate-400 hover:text-red-500 p-1">
                                            <Icons.Trash />
                                        </button>
                                    </div>
                                ))}
                            </div>

                            <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-3 py-4 bg-slate-900 text-white rounded-2xl hover:bg-slate-800 transition-all font-bold shadow-lg">
                                <Icons.Printer /> طباعة القائمة
                            </button>
                        </div>
                    </div>

                    {/* قسم المعاينة */}
                    <div className="w-full lg:w-1/2">
                        <div id="invoice-preview" className="bg-white p-8 md:p-12 shadow-xl min-h-[29.7cm] flex flex-col">
                            <div className="flex-grow space-y-8">
                                <div className="text-center border-b-2 border-slate-900 pb-8">
                                    <h1 className="text-3xl font-black text-slate-900">{BUSINESS_INFO.name}</h1>
                                    <p className="text-blue-600 font-bold text-lg">{BUSINESS_INFO.slogan}</p>
                                    <p className="text-slate-600 text-sm mt-2">{BUSINESS_INFO.address} | {BUSINESS_INFO.phone}</p>
                                </div>

                                <div className="grid grid-cols-2 gap-8">
                                    <div className="space-y-1">
                                        <p className="text-xs font-bold text-slate-400 uppercase">إلى السيد/ة:</p>
                                        <p className="text-lg font-bold border-b border-slate-100">{invoice.customerName || '....................'}</p>
                                        <p className="text-xs font-bold text-slate-400 uppercase mt-2">رقم الهاتف:</p>
                                        <p className="font-bold border-b border-slate-100">{invoice.customerPhone || '....................'}</p>
                                    </div>
                                    <div className="text-left space-y-1">
                                        <p className="text-xs font-bold text-slate-400 uppercase">رقم القائمة:</p>
                                        <p className="font-bold">{invoice.invoiceNumber}</p>
                                        <p className="text-xs font-bold text-slate-400 uppercase mt-2">التاريخ:</p>
                                        <p className="font-bold">{invoice.date}</p>
                                    </div>
                                </div>

                                <table className="w-full text-right border-collapse border-2 border-slate-900">
                                    <thead>
                                        <tr className="bg-slate-900 text-white">
                                            <th className="p-3 border border-slate-700 text-center w-12">#</th>
                                            <th className="p-3 border border-slate-700">المادة</th>
                                            <th className="p-3 border border-slate-700 text-center">الكمية</th>
                                            <th className="p-3 border border-slate-700 text-center">السعر</th>
                                            <th className="p-3 border border-slate-700 text-center">المجموع</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {invoice.items.map((item, i) => (
                                            <tr key={item.id} className="border-b border-slate-200">
                                                <td className="p-3 text-center border-l">{i + 1}</td>
                                                <td className="p-3 border-l font-medium">{item.description || '---'}</td>
                                                <td className="p-3 text-center border-l">{item.quantity}</td>
                                                <td className="p-3 text-center border-l">{item.price.toLocaleString()} د.ع</td>
                                                <td className="p-3 text-center font-bold">{(item.quantity * item.price).toLocaleString()} د.ع</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                <div className="flex justify-end pt-4">
                                    <div className="w-1/2 bg-slate-900 text-white p-4 rounded-xl flex justify-between items-center shadow-lg">
                                        <span className="font-bold">المجموع الكلي:</span>
                                        <span className="text-xl font-black">{subtotal.toLocaleString()} د.ع</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="pt-12 flex justify-between items-end border-t border-slate-100 mt-8">
                                <div className="text-center w-32">
                                    <div className="border-b border-slate-300 h-8"></div>
                                    <p className="text-[10px] font-bold text-slate-400 mt-2">توقيع المستلم</p>
                                </div>
                                <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest">نظام عالم ورق الكاشير الذكي</p>
                                <div className="text-center w-32">
                                    <div className="border-b border-slate-300 h-8"></div>
                                    <p className="text-[10px] font-bold text-slate-400 mt-2">توقيع المحاسب</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
