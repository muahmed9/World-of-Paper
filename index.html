async function getNextInvoiceNumber() {
    const now   = new Date();
    const month = now.getMonth() + 1;
    const ym    = now.toISOString().slice(0,7);
    try {
        const { count, error } = await sbClient
            .from('invoices')
            .select('id', { count:'exact', head:true })
            .gte('date', ym + '-01')
            .lte('date', ym + '-31');
        if(error) throw error;
        return `${month}-${(count||0)+1}`;
    } catch(e) {

    }
}

function calcSalesStats(invoices, products) {
    const map = {};
    let totalRevenue = 0;
    let totalCOGS    = 0;

    for (const inv of invoices) {
        if (inv.invoice_type !== 'sale') continue;
        for (const item of (inv.items || [])) {
            if (!item.description || item.isEmpty) continue;
            const name    = (item.description || '').trim();
            const sellPx  = Number(item.price    || 0);
            const qty     = Number(item.quantity  || 0);
            if (!name || qty === 0) continue;

            const prod = products.find(p =>
                p.name.toLowerCase().trim() === name.toLowerCase()
            );
            const costPx     = prod ? Number(prod.cost_price || 0) : 0;
            const hasProduct = !!prod;

            const lineRevenue = sellPx * qty;
            const lineCost    = costPx * qty;
            const lineProfit  = lineRevenue - lineCost;

            totalRevenue += lineRevenue;
            if (hasProduct) totalCOGS += lineCost;

            if (!map[name]) {
                map[name] = {
                    name, hasProduct,
                    totalQty: 0, totalRevenue: 0, totalCost: 0, totalProfit: 0,
                    txCount: 0, costPx, sellAvg: 0,
                };
            }
            map[name].totalQty     += qty;
            map[name].totalRevenue += lineRevenue;
            map[name].totalCost    += lineCost;
            map[name].totalProfit  += lineProfit;
            map[name].txCount++;
        }
    }

    const rows = Object.values(map).map(r => ({
        ...r,
        sellAvg: r.totalQty > 0 ? r.totalRevenue / r.totalQty : 0,
        margin:  r.totalRevenue > 0 ? (r.totalProfit / r.totalRevenue) * 100 : 0,
    }));

    const totalProfit = totalRevenue - totalCOGS;
    return { rows, totalRevenue, totalCOGS, totalProfit };
}

/* ══════════════════════════════════════
   AutocompleteInput
   يظهر مقترحات من جدول المنتجات أثناء الكتابة
   عند الاختيار يملأ الاسم والسعر تلقائياً
══════════════════════════════════════ */
function AutocompleteInput({ value, onSelect, products, inputStyle }) {
    const [open, setOpen]   = React.useState(false);
    const wrapRef           = React.useRef(null);
    const inputRef          = React.useRef(null);

    /* المقترحات: عند فراغ الحقل → أول 8 منتجات، وإلا → فلترة */
    const suggestions = React.useMemo(() => {
        const q = (value || '').trim().toLowerCase();
        if (!q) return products.slice(0, 8);
        /* مطابقة جزئية في أي موضع من الاسم */
        return products
            .filter(p => p.name.toLowerCase().includes(q))
            .slice(0, 8);
    }, [value, products]);

    /* إغلاق عند النقر خارج */
    React.useEffect(() => {
        const handler = e => {
            if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
    }, []);

    const handleSelect = (prod) => {
        onSelect(prod.name, Number(prod.sell_price) || 0);
        setOpen(false);
        inputRef.current && inputRef.current.blur();
    };

    /* تمييز النص المطابق داخل الاقتراح */
    const highlight = (text) => {
        const q = (value || '').trim();
        if (!q) return text;
        const idx = text.toLowerCase().indexOf(q.toLowerCase());
        if (idx === -1) return text;
        return (
            <>
                {text.slice(0, idx)}
                <mark style={{ background: '#bfdbfe', borderRadius: '2px', padding: '0 1px' }}>
                    {text.slice(idx, idx + q.length)}
                </mark>
                {text.slice(idx + q.length)}
            </>
        );
    };

    return (
        <div ref={wrapRef} style={{ position: 'relative', flex: 1 }}>
            <input
                ref={inputRef}
                placeholder="المادة"
                value={value}
                autoComplete="off"
                onChange={e => { onSelect(e.target.value, null); setOpen(true); }}
                onFocus={() => setOpen(true)}
                style={inputStyle}
            />
            {open && suggestions.length > 0 && (
                <div style={{
                    position: 'absolute', top: '100%', right: 0, left: 0, zIndex: 9999,
                    background: '#fff',
                    border: '2px solid #2563eb',
                    borderRadius: '10px',
                    boxShadow: '0 10px 30px rgba(37,99,235,.15)',
                    marginTop: '3px',
                    overflow: 'hidden',
                    direction: 'rtl',
                }}>
                    {/* رأس القائمة */}
                    <div style={{
                        padding: '5px 10px', fontSize: '10px', fontWeight: 800,
                        color: '#2563eb', background: '#eff6ff',
                        borderBottom: '1px solid #bfdbfe', ...F
                    }}>
                        اختر منتجاً أو تابع الكتابة
                    </div>

                    {suggestions.map((prod, i) => (
                        <div
                            key={prod.name}
                            className="ac-row"
                            onMouseDown={e => { e.preventDefault(); handleSelect(prod); }}
                            style={{
                                padding: '8px 12px',
                                cursor: 'pointer',
                                fontSize: '12px',
                                fontWeight: 700,
                                color: '#0f172a',
                                display: 'flex',
                                justifyContent: 'space-between',
                                alignItems: 'center',
                                borderBottom: i < suggestions.length - 1 ? '1px solid #f1f5f9' : 'none',
                                ...F
                            }}
                        >
                            <span>{highlight(prod.name)}</span>
                            {Number(prod.sell_price) > 0 && (
                                <span style={{
                                    fontSize: '11px', color: '#2563eb', fontWeight: 900,
                                    background: '#eff6ff', padding: '2px 8px',
                                    borderRadius: '99px', whiteSpace: 'nowrap', marginRight: '6px', ...F
                                }}>
                                    {Number(prod.sell_price).toLocaleString()} د.ع
                                </span>
                            )}
                        </div>
                    ))}
                </div>
            )}
        </div>
    );
}

        if (salesFilter === 'unknown') rows = rows.filter(r => !r.hasProduct);

            if (salesSort==='margin')  { va=a.margin;       vb=b.margin; }
            return salesDir==='desc' ? vb-va : va-vb;
        });
        return rows;

  name text not null,
  cost_price numeric default 0,
  sell_price numeric default 0,

  category   text default '',
  created_at timestamptz default now()

create table expenses (

  description text not null,
  amount      numeric default 0,
  date        date default current_date,
  category    text default '',
  created_at  timestamptz default now()
);

alter table products enable row level security;
create policy "all" on products for all using (true) with check (true);
alter table expenses enable row level security;
create policy "all" on expenses for all using (true) with check (true);`;

                                                        {isEditing ? <input value={editData.name} onChange={e=>setEditData(d=>({...d,name:e.target.value}))} style={{width:'100%',padding:'4px 7px',border:'1px solid #bfdbfe',borderRadius:'7px',fontSize:'12px',...F}}/> : p.name}
                                                    </td>
                                                    <td style={{color:'#64748b',fontSize:'12px',...F}}>
                                                        {isEditing ? <input value={editData.category} onChange={e=>setEditData(d=>({...d,category:e.target.value}))} style={{width:'70px',padding:'4px',border:'1px solid #e2e8f0',borderRadius:'7px',fontSize:'12px',...F}}/> : p.category||'—'}
                                                    </td>
                                                    <td style={{fontWeight:700,...F}}>

                                                    <td style={{fontWeight:700,...F}}>

                                                    </td>

                {!loading && section==='expenses' && (
                    <div className="fade-in" style={{display:'flex',gap:'20px',alignItems:'flex-start',flexWrap:'wrap'}}>
                        <div style={{width:'260px',flexShrink:0,background:'#f8fafc',borderRadius:'14px',padding:'16px',border:'1px solid #e2e8f0'}}>

                                                        <I.Trash/>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                )}

                {!loading && section==='summary' && (
                    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:'20px'}}>

                            <div style={{fontSize:'12px',fontWeight:700,opacity:.75,marginBottom:'6px',...F}}>
                                صافي الربح بعد المبيعات والصرفيات
                            </div>
                            <div style={{fontSize:'13px',fontWeight:700,opacity:.8,marginBottom:'8px',...F}}>
                                {netProfit>=0?'✅ النتيجة: ربح صافي':'❌ النتيجة: خسارة صافية'}
                            </div>
                            <div style={{fontSize:'42px',fontWeight:900,...F}}>
                                {numFmt(Math.abs(netProfit))} <span style={{fontSize:'18px',opacity:.8}}>د.ع</span>
                            </div>
                            <div style={{marginTop:'14px',display:'flex',gap:'20px',flexWrap:'wrap'}}>
                                {[
                                    ['إيرادات المبيعات', IQ(totalRevenue)],
                                    ['تكلفة البضاعة المباعة', IQ(totalCOGS)],
                                    ['ربح المبيعات', IQ(salesProfit)],
                                    ['الصرفيات', IQ(totalExpenses)],
                                ].map(([lbl,val])=>(
                                    <div key={lbl}>
                                        <div style={{fontSize:'10px',opacity:.65,fontWeight:600,...F}}>{lbl}</div>
                                        <div style={{fontSize:'14px',fontWeight:900,...F}}>{val}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
                            {[
                                {lbl:'إيرادات المبيعات الفعلية', val:IQ(totalRevenue),  icon:'💰', color:'#1e3a5f', bg:'#eff6ff'},
                                {lbl:'تكلفة البضاعة المباعة',   val:IQ(totalCOGS),     icon:'📦', color:'#0369a1', bg:'#e0f2fe'},
                                {lbl:'ربح المبيعات الإجمالي',   val:IQ(salesProfit),   icon:'📈', color:salesProfit>=0?'#16a34a':'#dc2626', bg:salesProfit>=0?'#f0fdf4':'#fef2f2'},
                                {lbl:'إجمالي الصرفيات',         val:IQ(totalExpenses), icon:'💸', color:'#dc2626', bg:'#fef2f2'},
                            ].map(({lbl,val,icon,color,bg})=>(
                                <div key={lbl} style={{background:bg,border:'1px solid #e2e8f0',borderRadius:'14px',padding:'16px 18px'}}>
                                    <div style={{fontSize:'12px',color:'#94a3b8',fontWeight:700,marginBottom:'6px',...F}}>{icon} {lbl}</div>
                                    <div style={{fontSize:'20px',fontWeight:900,color,...F}}>{val}</div>

                        <div style={{background:'#f8fafc',borderRadius:'14px',padding:'18px',border:'1px solid #e2e8f0'}}>
                            <div style={{fontWeight:900,fontSize:'14px',color:'#1e3a5f',marginBottom:'12px',...F}}>🧮 معادلة الحساب (أرباح فعلية بعد البيع)</div>
                            {[
                                ['إيرادات المبيعات',         IQ(totalRevenue),   '#0f172a'],
                                ['— تكلفة البضاعة المباعة', IQ(totalCOGS),      '#64748b'],

                                    <span style={{color:col,...F}}>{val}</span>

                        {salesRows.filter(r=>r.hasProduct).length > 0 && (

                                <div style={{fontWeight:900,fontSize:'14px',color:'#1e3a5f',marginBottom:'12px',...F}}>
                                    🏆 أعلى المواد ربحاً من المبيعات الفعلية
                                </div>
                                {[...salesRows]
                                    .filter(r=>r.hasProduct)
                                    .sort((a,b)=>b.totalProfit-a.totalProfit)

                                    .map((r,i)=>(

                        <div style={{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'14px',padding:'16px 18px'}}>
                            <div style={{fontWeight:800,fontSize:'13px',color:'#0369a1',marginBottom:'10px',...F}}>

                    </div>
                )}
            </div>
        </div>
    );
}


/* ══════════════════════════════════════
   RecordsView
══════════════════════════════════════ */
function RecordsView({ onLoadInvoice, onSwitchTab }) {
    const [records,    setRecords]    = useState([]);
    const [loading,    setLoading]    = useState(true);
    const [filterType, setFilterType] = useState('all');
    const [search,     setSearch]     = useState('');

    useEffect(()=>{ loadRecords(); }, []);

    const loadRecords = async () => {
        setLoading(true);
        try {
            const { data, error } = await sbClient.from('invoices').select('*').order('created_at',{ascending:false});
            if (error) throw error;
            setRecords(data || []);
        } catch(e) { toast('فشل تحميل السجل','error'); }
        setLoading(false);
    };

    const filtered = useMemo(()=>{
        return records.filter(r=>{
            if (filterType !== 'all' && r.invoice_type !== filterType) return false;
            if (search) {
                const s = search.toLowerCase();
                if (!r.customer_name?.toLowerCase().includes(s) && !r.invoice_number?.toString().includes(s)) return false;
            }
            return true;
        });
    }, [records, filterType, search]);

    const totalSubtotal = filtered.reduce((s,r)=>s+Number(r.subtotal||0),0);
    const totalDue      = filtered.reduce((s,r)=>s+Number(r.due_amount||0),0);
    const totalPaid     = filtered.reduce((s,r)=>s+Number(r.paid_amount||0),0);

    const exportExcel = () => {
        if (!window.XLSX) { toast('مكتبة Excel غير متاحة','error'); return; }
        const data = filtered.map(r=>({
            'رقم الوصل': r.invoice_number, 'التاريخ': r.date,
            'اسم الزبون': r.customer_name||'', 'الهاتف': r.customer_phone||'',
            'نوع الوصل': r.invoice_type==='receipt'?'سند قبض':'قائمة بيع',
            'المجموع الكلي (د.ع)': Number(r.subtotal||0),
            'المبلغ المدفوع (د.ع)': Number(r.paid_amount||0),
            'المبلغ المتبقي (د.ع)': Number(r.due_amount||0),
            'ملاحظات': r.notes||'',
        }));
        const ws = window.XLSX.utils.json_to_sheet(data);
        ws['!cols'] = [{wch:12},{wch:12},{wch:22},{wch:16},{wch:14},{wch:18},{wch:18},{wch:18},{wch:30}];
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, 'سجل الفواتير');
        window.XLSX.writeFile(wb, `سجل_الفواتير_عالم_ورق_${new Date().toISOString().split('T')[0]}.xlsx`);
        toast('تم تصدير ملف Excel ✓','success');
    };

    const handleLoad = (row) => { onLoadInvoice(row); onSwitchTab('create'); toast('تم تحميل الفاتورة','success'); };

    return (
        <div style={{background:'#fff',borderRadius:'20px',padding:'24px',boxShadow:'0 2px 12px rgba(0,0,0,.07)',border:'1px solid #e2e8f0'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px',flexWrap:'wrap',gap:'10px'}}>
                <h2 style={{fontWeight:900,fontSize:'19px',color:'#1e3a5f',margin:0,...F}}>سجل الإصدارات</h2>
                <div style={{display:'flex',gap:'8px'}}>
                    <button onClick={loadRecords} style={{display:'flex',alignItems:'center',gap:'6px',padding:'9px 14px',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:'10px',fontWeight:700,fontSize:'13px',cursor:'pointer',color:'#475569',...F}}>
                        <I.Refresh/> تحديث
                    </button>
                    <button onClick={exportExcel} style={{display:'flex',alignItems:'center',gap:'6px',padding:'9px 16px',background:'#16a34a',color:'#fff',border:'none',borderRadius:'10px',fontWeight:800,fontSize:'13px',cursor:'pointer',...F}}>
                        <I.Excel/> تصدير Excel
                    </button>
                </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',marginBottom:'18px'}}>
                {[['عدد السجلات',filtered.length,'#1e3a5f','#eff6ff'],['إجمالي المبيعات',totalSubtotal.toLocaleString()+' د.ع','#0f172a','#f8fafc'],['إجمالي المدفوع',totalPaid.toLocaleString()+' د.ع','#16a34a','#f0fdf4'],['إجمالي المتبقي',totalDue.toLocaleString()+' د.ع','#dc2626','#fef2f2']].map(([lbl,val,col,bg])=>(
                    <div key={lbl} style={{background:bg,border:'1px solid #e2e8f0',borderRadius:'12px',padding:'12px 14px'}}>
                        <div style={{fontSize:'11px',color:'#94a3b8',fontWeight:700,marginBottom:'4px',...F}}>{lbl}</div>
                        <div style={{fontSize:'17px',fontWeight:900,color:col,...F}}>{val}</div>
                    </div>
                ))}
            </div>

            <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'}}>
                {[['all','الكل 📋'],['sale','قوائم البيع 🧾'],['receipt','سندات القبض 💰']].map(([val,lbl])=>(
                    <button key={val} onClick={()=>setFilterType(val)}
                        style={{padding:'7px 14px',border:'2px solid',borderColor:filterType===val?'#1e3a5f':'#e2e8f0',
                            background:filterType===val?'#1e3a5f':'#fff',color:filterType===val?'#fff':'#64748b',
                            borderRadius:'10px',fontWeight:700,fontSize:'12px',cursor:'pointer',transition:'all .15s',...F}}>
                        {lbl}
                    </button>
                ))}
                <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="🔍 بحث باسم الزبون أو رقم الوصل..."
                    style={{flex:1,minWidth:'200px',padding:'8px 12px',border:'2px solid #e2e8f0',borderRadius:'10px',fontSize:'13px',fontWeight:600,...F}}/>
            </div>

            {loading ? (
                <div style={{textAlign:'center',padding:'60px',color:'#94a3b8',fontWeight:700,...F}}>
                    <div style={{fontSize:'32px',marginBottom:'10px'}}>⏳</div>جاري التحميل...
                </div>
            ) : filtered.length===0 ? (
                <div style={{textAlign:'center',padding:'60px',color:'#94a3b8',fontWeight:700,...F}}>
                    <div style={{fontSize:'32px',marginBottom:'10px'}}>📭</div>لا توجد سجلات مطابقة
                </div>
            ) : (
                <div style={{overflowX:'auto',borderRadius:'12px',border:'1px solid #e2e8f0'}}>
                    <table className="rec-table">
                        <thead><tr>
                            {['#','رقم الوصل','التاريخ','اسم الزبون','النوع','المجموع','مدفوع','المتبقي','تحميل'].map(h=>(
                                <th key={h} style={{...F}}>{h}</th>
                            ))}
                        </tr></thead>
                        <tbody>
                            {filtered.map((row,i)=>{
                                const subtotal  = Number(row.subtotal||0);
                                const paid      = Number(row.paid_amount||0);
                                const due       = Number(row.due_amount||0);
                                const isReceipt = row.invoice_type==='receipt';
                                return (
                                    <tr key={row.id}>
                                        <td style={{color:'#94a3b8',fontWeight:700,...F}}>{i+1}</td>
                                        <td style={{fontWeight:900,color:'#1e3a5f',...F}}>#{row.invoice_number}</td>
                                        <td style={{color:'#64748b',fontSize:'12px',...F}}>{row.date}</td>
                                        <td style={{fontWeight:700,textAlign:'right',...F}}>{row.customer_name||'—'}</td>
                                        <td>
                                            <span style={{display:'inline-block',padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:800,background:isReceipt?'#eff6ff':'#f0fdf4',color:isReceipt?'#2563eb':'#16a34a',...F}}>
                                                {isReceipt?'سند قبض':'قائمة بيع'}
                                            </span>
                                        </td>
                                        <td style={{fontWeight:700,...F}}>{subtotal.toLocaleString()}</td>
                                        <td style={{color:'#16a34a',fontWeight:700,...F}}>{paid.toLocaleString()}</td>
                                        <td style={{fontWeight:900,color:due>0?'#dc2626':'#16a34a',...F}}>{due.toLocaleString()}</td>
                                        <td>
                                            <button onClick={()=>handleLoad(row)}
                                                style={{display:'inline-flex',alignItems:'center',gap:'4px',padding:'5px 10px',background:'#1e3a5f',color:'#fff',border:'none',borderRadius:'7px',cursor:'pointer',fontWeight:700,fontSize:'11px',...F}}>
                                                <I.Eye/> تحميل
                                            </button>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            )}

            <div style={{textAlign:'center',marginTop:'12px',fontSize:'11px',color:'#94a3b8',fontWeight:600,...F}}>
                عدد النتائج: {filtered.length} من أصل {records.length}
            </div>
        </div>
    );
}

   App

function App() {
    const sheetRef  = useRef(null);
    const scalerRef = useRef(null);
    const colRef    = useRef(null);
    const invRef    = useRef({});

    const [activeTab, setActiveTab] = useState('create');

    /* ── جلب المنتجات لاستخدامها في الـ Autocomplete ── */
    const [products, setProducts] = useState([]);
    useEffect(()=>{
        sbClient.from('products').select('name,sell_price').order('name').then(({data})=>{
            if (data) setProducts(data);
        });
    }, []);

    const [inv, setInv] = useState({
        invoiceNumber: '...',
        date: new Date().toISOString().split('T')[0],
        customerName: '', customerPhone: '',
        items: [{ id:'1', description:'', quantity:1, price:0 }],
        invoiceType: 'sale', paidAmount: '',
        notes: 'البضاعة المباعة لا ترد ولا تستبدل بعد 24 ساعة.'
    });

    useEffect(()=>{
        getNextInvoiceNumber().then(num => setInv(p=>({...p, invoiceNumber:num})));
    }, []);

    const subtotal = useMemo(()=> inv.items.reduce((s,it)=>s+(Number(it.quantity)*Number(it.price)),0), [inv.items]);
    const paid     = Number(inv.paidAmount) || 0;
    const due      = Math.max(0, subtotal - paid);

    invRef.current = { inv, subtotal, paid, due };

    useEffect(()=>{
        const handler = () => {
            const { inv, subtotal, paid, due } = invRef.current;
            saveToSupabase(inv, subtotal, paid, due);
        };
        window.addEventListener('beforeprint', handler);
        return ()=> window.removeEventListener('beforeprint', handler);
    }, []);

    useEffect(()=>{
        const resize = ()=>{
            if(!scalerRef.current || !colRef.current) return;
            const avail = colRef.current.clientWidth - 32;
            const scale = Math.min(1, avail / 794);
            scalerRef.current.style.transform = `scale(${scale})`;
            scalerRef.current.style.height = `${1123 * scale}px`;
        };
        resize();
        const ro = new ResizeObserver(resize);
        if(colRef.current) ro.observe(colRef.current);
        return ()=> ro.disconnect();
    }, [activeTab]);

    const paddedItems = useMemo(()=>{
        const a = [...inv.items];
        while(a.length < 7) a.push({id:Math.random().toString(), description:'', quantity:'', price:'', isEmpty:true});
        return a;
    }, [inv.items]);

    const addItem    = ()=> setInv(p=>({...p, items:[...p.items,{id:Date.now().toString(),description:'',quantity:1,price:0}]}));
    const removeItem = id=> setInv(p=>({...p, items:p.items.filter(i=>i.id!==id)}));
    const updateItem = (id,f,v)=> setInv(p=>({...p, items:p.items.map(i=>i.id===id?{...i,[f]:v}:i)}));

    /* عند اختيار منتج من الـ autocomplete: يملأ الاسم والسعر */
    const selectProduct = (itemId, name, price) => {
        setInv(p=>({
            ...p,
            items: p.items.map(i => i.id === itemId
                ? { ...i, description: name, ...(price !== null && price > 0 ? { price } : {}) }
                : i
            )
        }));
    };

    const loadInvoice = row => {
        setInv({
            invoiceNumber: row.invoice_number, date: row.date,
            customerName: row.customer_name||'', customerPhone: row.customer_phone||'',
            items: row.items||[{id:'1',description:'',quantity:1,price:0}],
            invoiceType: row.invoice_type||'sale',
            paidAmount: row.paid_amount?.toString()||'', notes: row.notes||''
        });
    };

    const handlePDF = async ()=>{
        showLoading('جاري إنشاء ملف PDF...');
        try {
            await saveToSupabase(inv, subtotal, paid, due);
            const el = sheetRef.current;
            const saved = scalerRef.current.style.transform;
            scalerRef.current.style.transform = 'none';
            await new Promise(r=>setTimeout(r,80));
            await html2pdf().set({
                margin:0, filename:`فاتورة-${inv.invoiceNumber}.pdf`,
                image:{type:'jpeg',quality:0.98},
                html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff'},
                jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
            }).from(el).save();
            scalerRef.current.style.transform = saved;
            await advanceInvoiceNumber();
            toast('تم الحفظ وتصدير PDF ✓','success');
        } catch(e) { toast('حدث خطأ أثناء التصدير','error'); console.error(e); }
        hideLoading();
    };

    const handleWhatsApp = async ()=>{
        if(!inv.customerPhone){ toast('أدخل رقم هاتف الزبون أولاً','error'); return; }
        showLoading('جاري تجهيز صورة الفاتورة...');
        try {
            await document.fonts.ready;
            await saveToSupabase(inv, subtotal, paid, due);
            const el = sheetRef.current;
            const saved = scalerRef.current.style.transform;
            scalerRef.current.style.transform = 'none';
            await new Promise(r=>setTimeout(r,80));
            const dataUrl = await domtoimage.toPng(el,{quality:1,bgcolor:'#ffffff',width:794,height:1123,style:{direction:'rtl',fontFamily:"'Cairo', sans-serif"}});
            scalerRef.current.style.transform = saved;
            const res  = await fetch(dataUrl);
            const blob = await res.blob();
            const file = new File([blob],`فاتورة-${inv.invoiceNumber}.png`,{type:'image/png'});
            const wa   = toWA(inv.customerPhone);
            hideLoading();
            if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
                await navigator.share({files:[file],title:'فاتورة عالم ورق الكاشير'});
                await advanceInvoiceNumber();
                toast('تم الإرسال والحفظ ✓','success');
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href=url; a.download=`فاتورة-${inv.invoiceNumber}.png`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(()=>URL.revokeObjectURL(url),1000);
                const msg = encodeURIComponent(`مرحباً ${inv.customerName}،\nفاتورة رقم ${inv.invoiceNumber} من عالم ورق الكاشير.\n(الصورة محفوظة على جهازك)`);
                setTimeout(()=>window.open(`https://wa.me/${wa}?text=${msg}`,'_blank'),800);
                await advanceInvoiceNumber();
                toast('تم الحفظ والتنزيل ✓','success');
            }
        } catch(e) {
            hideLoading();
            if(e.name!=='AbortError'){ toast('حدث خطأ أثناء التجهيز','error'); console.error(e); }
        }
    };

    const advanceInvoiceNumber = async () => {
        const next = await getNextInvoiceNumber();
        setInv(p=>({...p, invoiceNumber:next}));
    };

    const handleSave = async ()=>{
        showLoading('جاري الحفظ...');
        const ok = await saveToSupabase(inv, subtotal, paid, due);
        hideLoading();
        if(ok) advanceInvoiceNumber();
        toast(ok?'تم الحفظ في قاعدة البيانات ✓':'فشل الحفظ، تحقق من الاتصال', ok?'success':'error');
    };

    /* ورقة الفاتورة */
    const Sheet = ()=>(
        <div id="invoice-sheet" ref={sheetRef}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'3px solid #1e3a5f',paddingBottom:'20px',marginBottom:'18px'}}>
                <div>
                    <div style={{fontSize:'30px',fontWeight:900,color:'#1e3a5f',lineHeight:1.1,...F}}>عالم ورق الكاشير</div>
                    <div style={{fontSize:'13px',fontWeight:700,color:'#2563eb',marginTop:'4px',...F}}>الجودة التي تستحقها تجارتكم</div>
                </div>
                <img src="logo.PNG" alt="عالم ورق الكاشير"
                    style={{height:'100px',width:'auto',maxWidth:'160px',objectFit:'contain',display:'block'}}
                    onError={e=>{
                        e.target.style.display='none';
                        const d=document.createElement('div');
                        d.style.cssText='width:100px;height:100px;border-radius:12px;background:#1e3a5f;display:flex;align-items:center;justify-content:center;';
                        d.innerHTML='<span style="color:#fff;font-size:28px;font-weight:900;font-family:Cairo,sans-serif">ع.و</span>';
                        e.target.parentNode.appendChild(d);
                    }}/>
            </div>

            <div style={{display:'flex',justifyContent:'center',marginBottom:'18px'}}>
                <div style={{border:'2.5px solid #1e3a5f',borderRadius:'12px',padding:'4px 42px',background:'#f8fafc'}}>
                    <span style={{fontSize:'22px',fontWeight:900,color:'#1e3a5f',...F}}>
                        {inv.invoiceType==='receipt'?'سند قبض':'قائمة بيع'}
                    </span>
                </div>
            </div>

            <div style={{display:'flex',justifyContent:'space-between',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',padding:'10px 16px',marginBottom:'18px'}}>
                <div style={{display:'flex',flexDirection:'column',gap:'8px',width:'55%'}}>
                    {[['السيد/ة:',inv.customerName],['الهاتف:',inv.customerPhone]].map(([lbl,val],i)=>(
                        <div key={i} style={{display:'flex',alignItems:'flex-end',gap:'8px'}}>
                            <span style={{fontWeight:700,color:'#64748b',fontSize:'12px',whiteSpace:'nowrap',...F}}>{lbl}</span>
                            <span style={{flex:1,borderBottom:'1.5px solid #94a3b8',fontWeight:800,fontSize:'13px',color:'#0f172a',paddingBottom:'2px',direction:i===1?'ltr':'rtl',...F}}>{val}</span>
                        </div>
                    ))}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                    {[['رقم الوصل:',inv.invoiceNumber,'19px',900],['التاريخ:',inv.date,'13px',700]].map(([lbl,val,sz,fw],i)=>(
                        <div key={i} style={{display:'flex',alignItems:'center',gap:'6px'}}>
                            <span style={{fontWeight:700,color:'#64748b',fontSize:'12px',...F}}>{lbl}</span>
                            <span style={{fontWeight:fw,fontSize:sz,color:'#1e3a5f',direction:'ltr',...F}}>{val}</span>
                        </div>
                    ))}
                </div>
            </div>

            {inv.invoiceType==='sale' ? (
                <>
                    <table className="inv-table">
                        <thead><tr>
                            <th style={{width:'28px'}}>#</th>
                            <th>المادة</th>
                            <th style={{width:'60px'}}>الكمية</th>
                            <th style={{width:'80px'}}>السعر</th>
                            <th style={{width:'90px'}}>المجموع</th>
                        </tr></thead>
                        <tbody>
                            {paddedItems.map((item,i)=>(
                                <tr key={i} style={{height:'28px'}}>
                                    <td style={{fontWeight:800,color:'#64748b',...F}}>{!item.isEmpty?i+1:''}</td>
                                    <td style={{textAlign:'right',paddingRight:'10px',...F}}>{item.description}</td>
                                    <td style={F}>{item.isEmpty?'':item.quantity}</td>
                                    <td style={F}>{item.price&&!item.isEmpty?Number(item.price).toLocaleString():''}</td>
                                    <td style={{fontWeight:800,...F}}>
                                        {!item.isEmpty&&item.quantity&&item.price?(Number(item.quantity)*Number(item.price)).toLocaleString():''}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>

                    <div style={{display:'flex',gap:'10px',marginTop:'10px',alignItems:'flex-start'}}>
                        <div style={{flex:1}}>
                            <div style={{fontWeight:900,color:'#1e3a5f',fontSize:'12px',marginBottom:'4px',...F}}>ملاحظات:</div>
                            <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'8px 10px',fontSize:'11px',fontWeight:600,color:'#475569',lineHeight:1.9,minHeight:'80px',...F}}>
                                {inv.notes||'لا توجد ملاحظات.'}
                            </div>
                        </div>
                        <div style={{width:'44%',border:'2px solid #1e3a5f',borderRadius:'10px',overflow:'hidden'}}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid #cbd5e1',background:'#f8fafc'}}>
                                <span style={{fontWeight:800,fontSize:'14px',color:'#1e3a5f',...F}}>{subtotal.toLocaleString()} <small style={{fontSize:'10px'}}>د.ع</small></span>
                                <div style={{textAlign:'right'}}>
                                    <div style={{fontWeight:900,fontSize:'12px',color:'#1e3a5f',...F}}>المجموع الكلي</div>
                                    <div style={{fontSize:'9px',color:'#94a3b8',...F}}>Total Amount</div>
                                </div>
                            </div>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:'1px solid #cbd5e1',background:'#fff'}}>
                                <span style={{fontWeight:800,fontSize:'14px',color:'#0f172a',...F}}>{paid.toLocaleString()} <small style={{fontSize:'10px'}}>د.ع</small></span>
                                <div style={{textAlign:'right'}}>
                                    <div style={{fontWeight:900,fontSize:'12px',color:'#0f172a',...F}}>مدفوع</div>
                                    <div style={{fontSize:'9px',color:'#94a3b8',...F}}>Paid</div>
                                </div>
                            </div>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:due>0?'#dc2626':'#1e3a5f'}}>
                                <span style={{fontWeight:900,fontSize:'19px',color:due>0?'#fff':'#4ade80',...F}}>
                                    {due.toLocaleString()} <small style={{fontSize:'10px'}}>د.ع</small>
                                </span>
                                <div style={{textAlign:'right'}}>
                                    <div style={{fontWeight:900,fontSize:'13px',color:'#fff',...F}}>الرصيد المستحق</div>
                                    <div style={{fontSize:'9px',color:'rgba(255,255,255,.65)',...F}}>Due Amount</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </>
            ) : (
                <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 30px'}}>
                    <div style={{border:'2.5px solid #1e3a5f',borderRadius:'14px',padding:'32px',background:'#f8fafc',position:'relative',overflow:'hidden'}}>
                        <div style={{position:'absolute',top:0,right:0,width:'5px',height:'100%',background:'#2563eb'}}></div>
                        {[['استلمنا من السيد/ة:',inv.customerName],['مبلغاً وقدره:',`${paid.toLocaleString()} دينار عراقي فقط`],['وذلك عن:',inv.notes]].map(([lbl,val],i)=>(
                            <div key={i} style={{display:'flex',alignItems:'flex-end',gap:'8px',marginBottom:i<2?'26px':'0',fontSize:'18px',fontWeight:700,color:'#0f172a',...F}}>
                                <span style={{whiteSpace:'nowrap',color:'#475569',fontSize:'15px',...F}}>{lbl}</span>
                                <span style={{flex:1,borderBottom:'2px solid #94a3b8',paddingBottom:'3px',color:'#1e3a5f',fontWeight:900,...F}}>{val}</span>
                            </div>
                        ))}
                    </div>
                </div>
            )}

            <div style={{marginTop:'auto',paddingTop:'20px'}}>
                <div style={{display:'flex',justifyContent:'space-between',padding:'0 50px',marginBottom:'20px'}}>
                    {['توقيع المستلم','توقيع المحاسب'].map(t=>(
                        <div key={t} style={{textAlign:'center',width:'130px'}}>
                            <div style={{borderBottom:'2.5px solid #94a3b8',height:'38px',marginBottom:'7px'}}></div>
                            <div style={{fontWeight:900,color:'#374151',fontSize:'12px',...F}}>{t}</div>
                        </div>
                    ))}
                </div>
                <div style={{background:'#1e3a5f',borderRadius:'10px',padding:'10px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px',direction:'ltr'}}>
                        <span style={{fontSize:'14px'}}>📞</span>
                        <span style={{fontWeight:800,color:'#fff',fontSize:'13px',direction:'ltr',letterSpacing:'0.5px',...F}}>+964 786 848 3823</span>
                    </div>
                    <div style={{fontWeight:900,color:'#93c5fd',fontSize:'13px',...F}}>عالم ورق الكاشير</div>
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <span style={{fontWeight:800,color:'#fff',fontSize:'13px',...F}}>بغداد — زيونة</span>
                        <span style={{fontSize:'14px'}}>📍</span>
                    </div>
                </div>
            </div>
        </div>
    );

    return (
        <div style={{minHeight:'100vh',padding:'16px'}}>
            <div style={{display:'inline-flex',gap:'4px',marginBottom:'16px',background:'#fff',borderRadius:'14px',padding:'5px',boxShadow:'0 2px 12px rgba(0,0,0,.08)',border:'1px solid #e2e8f0'}}>
                {[
                    ['create',    <I.Create/>,  'إنشاء فاتورة'],
                    ['records',   <I.Records/>, 'سجل الإصدارات'],
                    ['inventory', <I.Store/>,   'المخزن والأرباح'],
                ].map(([tab,icon,lbl])=>(
                    <button key={tab} onClick={()=>setActiveTab(tab)}
                        style={{display:'flex',alignItems:'center',gap:'7px',padding:'9px 20px',
                            background:activeTab===tab?'#1e3a5f':'transparent',
                            color:activeTab===tab?'#fff':'#64748b',
                            border:'none',borderRadius:'10px',fontWeight:800,fontSize:'13px',cursor:'pointer',transition:'all .15s',...F}}>
                        {icon} {lbl}
                    </button>
                ))}
            </div>

            {activeTab==='records' ? (
                <RecordsView onLoadInvoice={loadInvoice} onSwitchTab={setActiveTab}/>
            ) : activeTab==='inventory' ? (
                <InventoryView/>
            ) : (
                <div style={{display:'flex',gap:'20px',alignItems:'flex-start'}}>
                    {/* لوحة التحكم */}
                    <div style={{width:'285px',flexShrink:0,background:'#fff',borderRadius:'20px',padding:'18px',boxShadow:'0 2px 12px rgba(0,0,0,.07)',border:'1px solid #e2e8f0',display:'flex',flexDirection:'column',gap:'12px'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #e2e8f0',paddingBottom:'10px'}}>
                            <h1 style={{fontWeight:900,fontSize:'16px',color:'#1e3a5f',margin:0,...F}}>إعدادات الفاتورة</h1>
                            <button onClick={()=>setActiveTab('records')} title="سجل الإصدارات"
                                style={{background:'#f1f5f9',border:'none',borderRadius:'8px',padding:'6px',cursor:'pointer',color:'#475569',display:'flex'}}>
                                <I.Records/>
                            </button>
                        </div>

                        <div>
                            <label style={{fontSize:'11px',fontWeight:700,color:'#94a3b8',display:'block',marginBottom:'3px',...F}}>نوع الوصل</label>
                            <select value={inv.invoiceType} onChange={e=>setInv(p=>({...p,invoiceType:e.target.value}))}
                                style={{width:'100%',padding:'9px',border:'2px solid #e2e8f0',borderRadius:'11px',fontWeight:700,fontSize:'14px',background:'#fff',...F}}>
                                <option value="sale">قائمة بيع</option>
                                <option value="receipt">سند قبض</option>
                            </select>
                        </div>

                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px'}}>
                            <input value={inv.invoiceNumber} onChange={e=>setInv(p=>({...p,invoiceNumber:e.target.value}))} placeholder="رقم الوصل"
                                style={{padding:'9px',border:'2px solid #e2e8f0',borderRadius:'11px',fontWeight:700,fontSize:'14px',...F}}/>
                            <input type="date" value={inv.date} onChange={e=>setInv(p=>({...p,date:e.target.value}))}
                                style={{padding:'9px',border:'2px solid #e2e8f0',borderRadius:'11px',fontSize:'12px',...F}}/>
                        </div>

                        <input value={inv.customerName} onChange={e=>setInv(p=>({...p,customerName:e.target.value}))} placeholder="اسم الزبون"
                            style={{padding:'9px',border:'2px solid #e2e8f0',borderRadius:'11px',fontWeight:600,fontSize:'14px',...F}}/>
                        <input type="tel" value={inv.customerPhone} onChange={e=>setInv(p=>({...p,customerPhone:e.target.value}))} placeholder="رقم هاتف الزبون" dir="ltr"
                            style={{padding:'9px',border:'2px solid #e2e8f0',borderRadius:'11px',fontSize:'14px',...F}}/>

                        <div>
                            <label style={{fontSize:'11px',fontWeight:700,color:'#94a3b8',display:'block',marginBottom:'3px',...F}}>
                                {inv.invoiceType==='sale'?'المبلغ المدفوع (مقدم)':'مبلغ السند'}
                            </label>
                            <input type="number" value={inv.paidAmount} onChange={e=>setInv(p=>({...p,paidAmount:e.target.value}))} placeholder="0"
                                style={{width:'100%',padding:'9px',border:'2px solid #bfdbfe',borderRadius:'11px',fontWeight:800,fontSize:'15px',color:'#1d4ed8',background:'#eff6ff',...F}}/>
                        </div>

                        <div>
                            <label style={{fontSize:'11px',fontWeight:700,color:'#94a3b8',display:'block',marginBottom:'3px',...F}}>الملاحظات</label>
                            <textarea value={inv.notes} onChange={e=>setInv(p=>({...p,notes:e.target.value}))} rows={3}
                                style={{width:'100%',padding:'9px',border:'2px solid #e2e8f0',borderRadius:'11px',resize:'none',fontSize:'12px',...F}}/>
                        </div>

                        {inv.invoiceType==='sale' && (
                            <div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'7px'}}>
                                    <span style={{fontWeight:800,fontSize:'13px',color:'#1e3a5f',...F}}>المواد</span>
                                    <button onClick={addItem} style={{display:'flex',alignItems:'center',gap:'4px',padding:'5px 10px',background:'#2563eb',color:'#fff',border:'none',borderRadius:'9px',cursor:'pointer',fontWeight:700,fontSize:'12px',...F}}>
                                        <I.Plus/> إضافة
                                    </button>
                                </div>
                                <div style={{display:'flex',flexDirection:'column',gap:'5px',maxHeight:'240px',overflowY:'auto'}}>
                                    {inv.items.map(item=>(
                                        <div key={item.id} style={{display:'flex',gap:'5px',background:'#f8fafc',padding:'7px',borderRadius:'9px',border:'1px solid #e2e8f0'}}>
                                            {/* ── حقل المادة مع Autocomplete ── */}
                                            <AutocompleteInput
                                                value={item.description}
                                                products={products}
                                                onSelect={(name, price) => selectProduct(item.id, name, price)}
                                                inputStyle={{
                                                    width:'100%', padding:'5px 7px',
                                                    border:'1px solid #e2e8f0', borderRadius:'7px',
                                                    fontSize:'12px', fontFamily:"'Cairo',sans-serif"
                                                }}
                                            />
                                            <input type="number" placeholder="ك" value={item.quantity} onChange={e=>updateItem(item.id,'quantity',e.target.value)}
                                                style={{width:'44px',padding:'5px',border:'1px solid #e2e8f0',borderRadius:'7px',fontSize:'12px',textAlign:'center'}}/>
                                            <input type="number" placeholder="سعر" value={item.price} onChange={e=>updateItem(item.id,'price',e.target.value)}
                                                style={{width:'62px',padding:'5px',border:'1px solid #e2e8f0',borderRadius:'7px',fontSize:'12px',textAlign:'center'}}/>
                                            <button onClick={()=>removeItem(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ef4444',display:'flex',alignItems:'center'}}><I.Trash/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {inv.invoiceType==='sale' && (
                            <div style={{background:'#f8fafc',borderRadius:'12px',padding:'10px 12px',border:'1px solid #e2e8f0',fontSize:'13px'}}>
                                {[['المجموع:',subtotal,'#1e3a5f'],['مدفوع:',paid,'#0f172a'],['المتبقي:',due,due>0?'#dc2626':'#16a34a']].map(([lbl,val,col],i)=>(
                                    <div key={i} style={{display:'flex',justifyContent:'space-between',color:col,fontWeight:i===2?900:700,marginBottom:i<2?'4px':0}}>
                                        <span style={F}>{lbl}</span>
                                        <span style={{direction:'ltr',...F}}>{val.toLocaleString()} د.ع</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div style={{display:'flex',flexDirection:'column',gap:'7px',paddingTop:'2px'}}>
                            <button onClick={handlePDF} style={{display:'flex',justifyContent:'center',alignItems:'center',gap:'7px',padding:'12px',background:'#1e3a5f',color:'#fff',border:'none',borderRadius:'13px',fontWeight:800,fontSize:'14px',cursor:'pointer',...F}}>
                                <I.PDF/> تصدير PDF + حفظ
                            </button>
                            <button onClick={handleWhatsApp} style={{display:'flex',justifyContent:'center',alignItems:'center',gap:'7px',padding:'12px',background:'#16a34a',color:'#fff',border:'none',borderRadius:'13px',fontWeight:800,fontSize:'14px',cursor:'pointer',...F}}>
                                <I.WA/> واتساب + حفظ
                            </button>
                            <button onClick={handleSave} style={{display:'flex',justifyContent:'center',alignItems:'center',gap:'7px',padding:'12px',background:'#7c3aed',color:'#fff',border:'none',borderRadius:'13px',fontWeight:800,fontSize:'14px',cursor:'pointer',...F}}>
                                <I.Save/> حفظ في قاعدة البيانات
                            </button>
                        </div>

                        <div style={{display:'flex',alignItems:'center',gap:'6px',justifyContent:'center',fontSize:'11px',color:'#16a34a',fontWeight:700,...F}}>
                            <div style={{width:'7px',height:'7px',borderRadius:'50%',background:'#16a34a',animation:'pulse 2s infinite'}}></div>
                            متصل بقاعدة البيانات
                        </div>
                    </div>

                    {/* معاينة الفاتورة */}
                    <div ref={colRef} style={{flex:1,overflow:'hidden',paddingBottom:'40px'}}>
                        <div ref={scalerRef} style={{transformOrigin:'top right',display:'inline-block'}}>
                            <div style={{boxShadow:'0 4px 28px rgba(0,0,0,.15)',borderRadius:'2px'}}>
                                <Sheet/>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
