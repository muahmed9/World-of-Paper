<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عالم ورق الكاشير - مولد الفواتير</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Cairo', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Cairo', sans-serif; }
    body { background-color: #f8fafc; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      @page { margin: 1cm; }
    }
    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 0 2px #3b82f6;
      border-color: transparent;
    }
    .item-row { transition: background 0.15s; }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { createElement as h, useState, useMemo } from 'https://esm.sh/react@19';
import { createRoot } from 'https://esm.sh/react-dom@19/client';

const BUSINESS = {
  name: "عالم ورق الكاشير",
  slogan: "الجودة التي تستحقها تجارتكم",
  address: "بغداد - زيونة",
  phone: "+964 786 848 3823",
};

function fmt(n) {
  return Number(n).toLocaleString('ar-IQ');
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function uid() {
  return Math.random().toString(36).slice(2, 9);
}

function App() {
  const [inv, setInv] = useState({
    number: `INV-${Date.now().toString().slice(-6)}`,
    date: today(),
    customer: '',
    phone: '',
    notes: '',
    items: [{ id: '1', desc: '', qty: 1, price: 0 }],
  });

  const total = useMemo(() =>
    inv.items.reduce((s, i) => s + i.qty * i.price, 0),
    [inv.items]
  );

  const set = (k, v) => setInv(p => ({ ...p, [k]: v }));

  const addItem = () =>
    setInv(p => ({ ...p, items: [...p.items, { id: uid(), desc: '', qty: 1, price: 0 }] }));

  const removeItem = id =>
    inv.items.length > 1 && setInv(p => ({ ...p, items: p.items.filter(i => i.id !== id) }));

  const setItem = (id, k, v) =>
    setInv(p => ({ ...p, items: p.items.map(i => i.id === id ? { ...i, [k]: v } : i) }));

  // ─── Input helper ─────────────────────────────────
  const inp = (value, onChange, opts = {}) =>
    h('input', {
      value,
      onChange: e => onChange(e.target.value),
      className: `w-full px-3 py-2 rounded-xl border border-slate-200 bg-white transition-all ${opts.cls || ''}`,
      ...opts,
    });

  // ─── FORM SECTION ──────────────────────────────────
  const formSection = h('div', { className: 'w-full md:w-1/2 space-y-6 no-print' },
    h('div', { className: 'bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6' },

      // Title
      h('div', { className: 'flex items-center gap-3 border-b border-slate-100 pb-4' },
        h('div', { className: 'p-2 bg-blue-50 rounded-lg' },
          h('svg', { className: 'w-6 h-6 text-blue-600', fill: 'none', stroke: 'currentColor', strokeWidth: 2, viewBox: '0 0 24 24' },
            h('path', { d: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z' }),
            h('polyline', { points: '14 2 14 8 20 8' }),
            h('line', { x1: 16, y1: 13, x2: 8, y2: 13 }),
            h('line', { x1: 16, y1: 17, x2: 8, y2: 17 }),
          )
        ),
        h('h1', { className: 'text-xl font-bold text-slate-800' }, 'تفاصيل القائمة')
      ),

      // Fields grid
      h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4' },
        ...[
          ['رقم القائمة', inv.number, v => set('number', v), 'text'],
          ['التاريخ', inv.date, v => set('date', v), 'date'],
          ['اسم الزبون', inv.customer, v => set('customer', v), 'text'],
          ['رقم الهاتف', inv.phone, v => set('phone', v), 'text'],
        ].map(([label, val, onChange, type]) =>
          h('div', { className: 'space-y-1', key: label },
            h('label', { className: 'text-sm font-medium text-slate-600' }, label),
            h('input', {
              type, value: val,
              onChange: e => onChange(e.target.value),
              className: 'w-full px-4 py-2 rounded-xl border border-slate-200 transition-all',
            })
          )
        )
      ),

      // Items
      h('div', { className: 'space-y-3 pt-2' },
        h('div', { className: 'flex items-center justify-between' },
          h('h2', { className: 'text-lg font-semibold text-slate-800' }, 'المواد'),
          h('button', {
            onClick: addItem,
            className: 'flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm font-medium',
          }, '+ إضافة مادة')
        ),
        ...inv.items.map(item =>
          h('div', { key: item.id, className: 'flex flex-wrap sm:flex-nowrap gap-2 p-3 bg-slate-50 rounded-xl border border-slate-100' },
            h('input', { type: 'text', placeholder: 'وصف المادة', value: item.desc, onChange: e => setItem(item.id, 'desc', e.target.value), className: 'flex-1 min-w-[150px] px-3 py-2 bg-white border border-slate-200 rounded-lg' }),
            h('input', { type: 'number', placeholder: 'الكمية', value: item.qty, onChange: e => setItem(item.id, 'qty', +e.target.value), className: 'w-20 px-3 py-2 bg-white border border-slate-200 rounded-lg' }),
            h('input', { type: 'number', placeholder: 'السعر', value: item.price, onChange: e => setItem(item.id, 'price', +e.target.value), className: 'w-28 px-3 py-2 bg-white border border-slate-200 rounded-lg' }),
            h('button', { onClick: () => removeItem(item.id), className: 'p-2 text-slate-400 hover:text-red-500' }, '🗑')
          )
        )
      ),

      // Notes
      h('div', { className: 'space-y-1 pt-2' },
        h('label', { className: 'text-sm font-medium text-slate-600' }, 'ملاحظات إضافية'),
        h('textarea', {
          value: inv.notes,
          onChange: e => set('notes', e.target.value),
          placeholder: 'أي ملاحظات...',
          className: 'w-full px-4 py-2 rounded-xl border border-slate-200 h-20 resize-none',
        })
      ),

      // Print button
      h('div', { className: 'pt-4 border-t border-slate-100' },
        h('button', {
          onClick: () => window.print(),
          className: 'w-full py-4 bg-slate-900 text-white rounded-2xl hover:bg-slate-800 font-bold text-lg',
        }, '🖨️ طباعة القائمة')
      )
    )
  );

  // ─── PREVIEW SECTION ───────────────────────────────
  const previewSection = h('div', { className: 'w-full md:w-1/2' },
    h('div', { className: 'bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden sticky top-8' },
      h('div', { className: 'p-8 space-y-6 bg-white' },

        // Header
        h('div', { className: 'flex flex-col items-center text-center space-y-3 border-b-2 border-slate-900 pb-6' },
          h('div', { className: 'w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg' },
            h('svg', { className: 'w-12 h-12', fill: 'none', stroke: 'currentColor', strokeWidth: 2, viewBox: '0 0 24 24' },
              h('path', { d: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z' }),
              h('polyline', { points: '14 2 14 8 20 8' }),
              h('line', { x1: 16, y1: 13, x2: 8, y2: 13 }),
              h('line', { x1: 16, y1: 17, x2: 8, y2: 17 }),
            )
          ),
          h('div', null,
            h('h1', { className: 'text-2xl font-black text-slate-900' }, BUSINESS.name),
            h('p', { className: 'text-blue-600 font-bold' }, BUSINESS.slogan),
          ),
          h('div', { className: 'flex flex-wrap justify-center gap-4 text-sm text-slate-600' },
            h('span', null, '📍 ' + BUSINESS.address),
            h('span', { dir: 'ltr' }, '📞 ' + BUSINESS.phone),
          )
        ),

        // Meta
        h('div', { className: 'grid grid-cols-2 gap-4 text-sm' },
          h('div', { className: 'space-y-2' },
            h('div', { className: 'flex gap-2' },
              h('span', { className: 'text-slate-400 whitespace-nowrap' }, 'السيد/ة:'),
              h('span', { className: 'font-bold border-b border-slate-200 flex-1' }, inv.customer || '......................'),
            ),
            h('div', { className: 'flex gap-2' },
              h('span', { className: 'text-slate-400 whitespace-nowrap' }, 'الهاتف:'),
              h('span', { className: 'font-bold border-b border-slate-200 flex-1', dir: 'ltr' }, inv.phone || '......................'),
            ),
          ),
          h('div', { className: 'space-y-2 text-left', dir: 'ltr' },
            h('div', { className: 'flex justify-end gap-2' },
              h('span', { className: 'font-bold' }, inv.number),
              h('span', { className: 'text-slate-400' }, ':رقم'),
            ),
            h('div', { className: 'flex justify-end gap-2' },
              h('span', { className: 'font-bold' }, inv.date),
              h('span', { className: 'text-slate-400' }, ':التاريخ'),
            ),
          ),
        ),

        // Table
        h('div', { className: 'border-2 border-slate-900 rounded-xl overflow-hidden' },
          h('table', { className: 'w-full text-right border-collapse text-sm' },
            h('thead', null,
              h('tr', { className: 'bg-slate-900 text-white' },
                h('th', { className: 'p-3 border-l border-slate-700 w-8 text-center' }, '#'),
                h('th', { className: 'p-3 border-l border-slate-700' }, 'المادة'),
                h('th', { className: 'p-3 border-l border-slate-700 text-center' }, 'الكمية'),
                h('th', { className: 'p-3 border-l border-slate-700 text-center' }, 'السعر'),
                h('th', { className: 'p-3 text-center' }, 'المجموع'),
              )
            ),
            h('tbody', { className: 'divide-y divide-slate-200' },
              ...inv.items.map((item, i) =>
                h('tr', { key: item.id, className: i % 2 === 0 ? 'bg-white' : 'bg-slate-50' },
                  h('td', { className: 'p-3 text-slate-400 text-center border-l border-slate-200' }, i + 1),
                  h('td', { className: 'p-3 font-medium text-slate-900 border-l border-slate-200' }, item.desc || '---'),
                  h('td', { className: 'p-3 text-center border-l border-slate-200' }, item.qty),
                  h('td', { className: 'p-3 text-center border-l border-slate-200' }, fmt(item.price) + ' د.ع'),
                  h('td', { className: 'p-3 font-bold text-center' }, fmt(item.qty * item.price) + ' د.ع'),
                )
              ),
              ...Array.from({ length: Math.max(0, 6 - inv.items.length) }).map((_, i) =>
                h('tr', { key: 'e' + i, className: 'h-10' },
                  h('td', { className: 'border-l border-slate-200' }),
                  h('td', { className: 'border-l border-slate-200' }),
                  h('td', { className: 'border-l border-slate-200' }),
                  h('td', { className: 'border-l border-slate-200' }),
                  h('td'),
                )
              )
            )
          )
        ),

        // Total + notes
        h('div', { className: 'flex justify-between items-start pt-2' },
          h('div', { className: 'w-1/2 text-sm text-slate-600 space-y-1' },
            h('p', { className: 'font-bold text-slate-400 text-xs' }, 'ملاحظات:'),
            h('p', { className: 'leading-relaxed' },
              inv.notes || 'شكراً لتعاملكم معنا. البضاعة لا ترد بعد ٢٤ ساعة.'
            ),
          ),
          h('div', { className: 'flex justify-between items-center p-4 bg-slate-900 text-white rounded-xl min-w-[160px]' },
            h('span', { className: 'text-sm font-bold' }, 'المجموع:'),
            h('span', { className: 'text-lg font-black' }, fmt(total) + ' د.ع'),
          )
        ),

        // Signatures
        h('div', { className: 'pt-8 flex justify-between' },
          h('div', { className: 'text-center' },
            h('div', { className: 'w-36 border-b-2 border-slate-200 mb-2' }),
            h('p', { className: 'text-xs text-slate-400' }, 'توقيع المستلم'),
          ),
          h('div', { className: 'text-center' },
            h('div', { className: 'w-36 border-b-2 border-slate-200 mb-2' }),
            h('p', { className: 'text-xs text-slate-400' }, 'توقيع المحاسب'),
          ),
        ),

        h('p', { className: 'text-center text-[10px] text-slate-300 pt-4' },
          'عالم ورق الكاشير — بغداد، زيونة'
        ),
      )
    )
  );

  return h('div', {
    className: 'min-h-screen flex flex-col md:flex-row gap-8 p-4 md:p-8 max-w-7xl mx-auto',
    dir: 'rtl',
  }, formSection, previewSection);
}

createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
