function sendToWhatsApp(inv,items,total,docType){
  const lines=items.filter(i=>i.desc).map((i,idx)=>
    `${idx+1}. ${i.desc} — الكمية: ${i.qty} × ${fmt(i.price)} = ${fmt(i.qty*i.price)} د.ع`
  );
  const header = docType==='receipt' ? '🧾 سند قبض' : '📋 قائمة بيع';
  const msg=[
    `${header}`,
    `━━━━━━━━━━━━━━━━━━`,
    `🏪 ${BUSINESS.name}`,
    `📅 التاريخ: ${inv.date}`,
    `🔢 رقم الوصل: ${inv.number}`,
    ``,
    `👤 الزبون: ${inv.customer||'—'}`,
    inv.phone?`📞 ${inv.phone}`:'',
    ``,
    `📦 المواد:`,
    ...lines,
    ``,
    `━━━━━━━━━━━━━━━━━━`,
    `💰 المجموع الكلي: ${fmt(total)} د.ع`,
    inv.notes?`\n📝 ملاحظات: ${inv.notes}`:'',
    ``,
    `📍 ${BUSINESS.address} | ☎️ ${BUSINESS.phone}`,
  ].filter(x=>x!=='').join('\n');
  const url=`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

function App(){
  const [docType,setDocType]=useState('sale'); // 'sale' | 'receipt'
  const [inv,setInv]=useState({
    number:String(Math.floor(1000+Math.random()*9000)),
    date:today(),
    customer:'',
    phone:'',
    notes:'',
    items:[{id:'1',desc:'',qty:1,price:0}],
    // receipt extra
    receivedFrom:'',
    amount:0,
    purpose:'',
  });

  const total=useMemo(()=>
    docType==='sale'
      ? inv.items.reduce((s,i)=>s+i.qty*i.price,0)
      : inv.amount
  ,[inv.items,inv.amount,docType]);

  const set=(k,v)=>setInv(p=>({...p,[k]:v}));
  const addItem=()=>setInv(p=>({...p,items:[...p.items,{id:uid(),desc:'',qty:1,price:0}]}));
  const removeItem=id=>inv.items.length>1&&setInv(p=>({...p,items:p.items.filter(i=>i.id!==id)}));
  const setItem=(id,k,v)=>setInv(p=>({...p,items:p.items.map(i=>i.id===id?{...i,[k]:v}:i)}));

  const docLabel = docType==='sale' ? 'قائمة بيع' : 'سند قبض';

  // ── SHARED HEADER for preview ──────────────────────
  const previewHeader = h('div',{className:'flex items-center justify-between pb-5 border-b-2 border-slate-800 mb-5'},
    // Right: company name
    h('div',{className:'text-right'},
      h('h1',{className:'text-2xl font-black text-slate-900 leading-tight'},BUSINESS.name),
      h('p',{className:'text-blue-700 font-bold text-sm'},BUSINESS.slogan),
    ),
    // Left: logo
    h('img',{src:`data:image/png;base64,${LOGO}`,className:'w-20 h-20 object-contain'})
  );

  // ── SALE PREVIEW ───────────────────────────────────
  const salePreview = h('div',{className:'space-y-5'},
    previewHeader,

    // Title
    h('div',{className:'text-center'},
      h('h2',{className:'text-xl font-black text-slate-800 border-2 border-slate-800 inline-block px-8 py-1 rounded-lg'},'قائمة بيع')
    ),

    // Meta: customer left, number+date right
    h('div',{className:'grid grid-cols-2 gap-4 text-sm mt-3'},
      h('div',{className:'space-y-2'},
        h('div',{className:'flex gap-2 items-baseline'},
          h('span',{className:'text-slate-500 whitespace-nowrap text-xs'},'السيد/ة:'),
          h('span',{className:'font-bold border-b border-slate-300 flex-1 pb-0.5'},inv.customer||'......................'),
        ),
        h('div',{className:'flex gap-2 items-baseline'},
          h('span',{className:'text-slate-500 text-xs'},'الهاتف:'),
          h('span',{className:'font-bold border-b border-slate-300 flex-1 pb-0.5',dir:'ltr'},inv.phone||'......................'),
        ),
      ),
      h('div',{className:'space-y-2 text-left',dir:'ltr'},
        h('div',{className:'flex justify-end items-baseline gap-2'},
          h('span',{className:'font-bold'},inv.number),
          h('span',{className:'text-slate-500 text-xs'},':رقم الوصل'),
        ),
        h('div',{className:'flex justify-end items-baseline gap-2'},
          h('span',{className:'font-bold'},inv.date),
          h('span',{className:'text-slate-500 text-xs'},':التاريخ'),
        ),
      ),
    ),

    // Table
    h('div',{className:'border-2 border-slate-800 rounded-xl overflow-hidden mt-2'},
      h('table',{className:'w-full text-right border-collapse text-sm'},
        h('thead',null,
          h('tr',{className:'bg-slate-900 text-white'},
            h('th',{className:'p-3 border-l border-slate-600 w-8 text-center'},'#'),
            h('th',{className:'p-3 border-l border-slate-600'},'المادة'),
            h('th',{className:'p-3 border-l border-slate-600 text-center'},'الكمية'),
            h('th',{className:'p-3 border-l border-slate-600 text-center'},'السعر'),
            h('th',{className:'p-3 text-center'},'المجموع'),
          )
        ),
        h('tbody',{className:'divide-y divide-slate-200'},
          ...inv.items.map((item,i)=>
            h('tr',{key:item.id,className:i%2===0?'bg-white':'bg-slate-50'},
              h('td',{className:'p-3 text-slate-400 text-center border-l border-slate-200'},i+1),
              h('td',{className:'p-3 font-medium text-slate-900 border-l border-slate-200'},item.desc||'---'),
              h('td',{className:'p-3 text-center border-l border-slate-200'},item.qty),
              h('td',{className:'p-3 text-center border-l border-slate-200'},fmt(item.price)+' د.ع'),
              h('td',{className:'p-3 font-bold text-center'},fmt(item.qty*item.price)+' د.ع'),
            )
          ),
          ...Array.from({length:Math.max(0,8-inv.items.length)}).map((_,i)=>
            h('tr',{key:'e'+i,className:'h-9'},
              h('td',{className:'border-l border-slate-200'}),
              h('td',{className:'border-l border-slate-200'}),
              h('td',{className:'border-l border-slate-200'}),
              h('td',{className:'border-l border-slate-200'}),
              h('td'),
            )
          )
        )
      )
    ),

    // Total + notes
    h('div',{className:'flex justify-between items-start'},
      h('div',{className:'w-1/2 text-sm text-slate-600 space-y-1'},
        h('p',{className:'font-bold text-slate-400 text-xs'},'ملاحظات:'),
        h('p',{className:'leading-relaxed text-xs'},inv.notes||'البضاعة المباعة لا ترد ولا تستبدل بعد ٢٤ ساعة.'),
      ),
      h('div',{className:'flex flex-col items-end gap-1'},
        h('div',{className:'flex justify-between items-center gap-4 px-4 py-3 bg-slate-900 text-white rounded-xl min-w-[170px]'},
          h('span',{className:'text-sm font-bold'},'المجموع الكلي:'),
          h('span',{className:'text-lg font-black'},fmt(total)+' د.ع'),
        )
      )
    ),

    // Signatures
    h('div',{className:'pt-6 flex justify-between'},
      h('div',{className:'text-center'},
        h('div',{className:'w-36 border-b-2 border-slate-300 mb-1'}),
        h('p',{className:'text-xs text-slate-400'},'توقيع المستلم'),
      ),
      h('div',{className:'text-center'},
        h('div',{className:'w-36 border-b-2 border-slate-300 mb-1'}),
        h('p',{className:'text-xs text-slate-400'},'توقيع المحاسب'),
      ),
    ),

    // Footer
    h('div',{className:'mt-6 pt-3 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500'},
      h('span',null,'📍 '+BUSINESS.address),
      h('span',{dir:'ltr'},'📞 '+BUSINESS.phone),
    )
  );

  // ── RECEIPT PREVIEW ────────────────────────────────
  const receiptPreview = h('div',{className:'space-y-5'},
    previewHeader,
    h('div',{className:'text-center'},
      h('h2',{className:'text-xl font-black text-slate-800 border-2 border-slate-800 inline-block px-8 py-1 rounded-lg'},'سند قبض')
    ),
    h('div',{className:'grid grid-cols-2 gap-4 text-sm mt-3'},
      h('div',{className:'space-y-2'},
        h('div',{className:'flex gap-2 items-baseline'},
          h('span',{className:'text-slate-500 text-xs'},'استلمنا من السيد/ة:'),
          h('span',{className:'font-bold border-b border-slate-300 flex-1 pb-0.5'},inv.receivedFrom||'......................'),
        ),
      ),
      h('div',{className:'space-y-2 text-left',dir:'ltr'},
        h('div',{className:'flex justify-end items-baseline gap-2'},
          h('span',{className:'font-bold'},inv.number),
          h('span',{className:'text-slate-500 text-xs'},':رقم السند'),
        ),
        h('div',{className:'flex justify-end items-baseline gap-2'},
          h('span',{className:'font-bold'},inv.date),
          h('span',{className:'text-slate-500 text-xs'},':التاريخ'),
        ),
      ),
    ),
    // Amount box
    h('div',{className:'border-2 border-slate-800 rounded-xl p-5 space-y-4 mt-2'},
      h('div',{className:'flex items-center gap-4'},
        h('span',{className:'text-slate-600 font-bold whitespace-nowrap'},'المبلغ المستلم:'),
        h('div',{className:'flex-1 border-b-2 border-slate-800 pb-1 text-center text-lg font-black text-slate-900'},
          fmt(inv.amount)+' د.ع'
        ),
      ),
      h('div',{className:'flex items-center gap-4'},
        h('span',{className:'text-slate-600 font-bold whitespace-nowrap'},'وذلك عن:'),
        h('div',{className:'flex-1 border-b border-slate-300 pb-1 font-medium text-slate-900'},
          inv.purpose||'.......................'
        ),
      ),
      h('div',{className:'flex items-center gap-4'},
        h('span',{className:'text-slate-600 font-bold whitespace-nowrap'},'ملاحظات:'),
        h('div',{className:'flex-1 border-b border-slate-300 pb-1 text-slate-700 text-sm'},
          inv.notes||'.......................'
        ),
      ),
    ),
    h('div',{className:'pt-8 flex justify-between'},
      h('div',{className:'text-center'},
        h('div',{className:'w-36 border-b-2 border-slate-300 mb-1'}),
        h('p',{className:'text-xs text-slate-400'},'توقيع المستلم'),
      ),
      h('div',{className:'text-center'},
        h('div',{className:'w-36 border-b-2 border-slate-300 mb-1'}),
        h('p',{className:'text-xs text-slate-400'},'توقيع المحاسب'),
      ),
    ),
    h('div',{className:'mt-6 pt-3 border-t border-slate-200 flex justify-between items-center text-xs text-slate-500'},
      h('span',null,'📍 '+BUSINESS.address),
      h('span',{dir:'ltr'},'📞 '+BUSINESS.phone),
    )
  );

  // ── FORM ───────────────────────────────────────────
  const saleForm = h('div',{className:'space-y-4'},
    h('div',{className:'grid grid-cols-2 gap-3'},
      ...[
        ['رقم الوصل','number','text',inv.number,v=>set('number',v.replace(/\D/g,''))],
        ['التاريخ','date','date',inv.date,v=>set('date',v)],
        ['اسم الزبون','customer','text',inv.customer,v=>set('customer',v)],
        ['هاتف الزبون','phone','text',inv.phone,v=>set('phone',v)],
      ].map(([label,_,type,val,fn])=>
        h('div',{key:label,className:'space-y-1'},
          h('label',{className:'text-xs font-medium text-slate-500'},label),
          h('input',{type,value:val,onChange:e=>fn(e.target.value),className:'w-full px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm'})
        )
      )
    ),
    // Items
    h('div',{className:'space-y-2'},
      h('div',{className:'flex items-center justify-between'},
        h('p',{className:'text-sm font-bold text-slate-700'},'المواد'),
        h('button',{onClick:addItem,className:'px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700'},'+ إضافة')
      ),
      ...inv.items.map(item=>
        h('div',{key:item.id,className:'flex gap-2 items-center'},
          h('input',{type:'text',placeholder:'المادة',value:item.desc,onChange:e=>setItem(item.id,'desc',e.target.value),className:'flex-1 px-3 py-2 rounded-lg border border-slate-200 bg-white text-sm'}),
          h('input',{type:'number',placeholder:'كمية',value:item.qty,onChange:e=>setItem(item.id,'qty',+e.target.value),className:'w-16 px-2 py-2 rounded-lg border border-slate-200 bg-white text-sm text-center'}),
          h('input',{type:'number',placeholder:'سعر',value:item.price,onChange:e=>setItem(item.id,'price',+e.target.value),className:'w-24 px-2 py-2 rounded-lg border border-slate-200 bg-white text-sm text-center'}),
          h('button',{onClick:()=>removeItem(item.id),className:'text-slate-300 hover:text-red-500 text-lg leading-none'},'×'),
        )
      )
    ),
    h('div',{className:'space-y-1'},
      h('label',{className:'text-xs font-medium text-slate-500'},'ملاحظات'),
      h('textarea',{value:inv.notes,onChange:e=>set('notes',e.target.value),placeholder:'ملاحظات...',className:'w-full px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm h-16 resize-none'})
    )
  );

  const receiptForm = h('div',{className:'space-y-4'},
    h('div',{className:'grid grid-cols-2 gap-3'},
      ...[
        ['رقم السند','number','text',inv.number,v=>set('number',v.replace(/\D/g,''))],
        ['التاريخ','date','date',inv.date,v=>set('date',v)],
        ['استلمنا من','receivedFrom','text',inv.receivedFrom,v=>set('receivedFrom',v)],
        ['المبلغ (د.ع)','amount','number',inv.amount,v=>set('amount',+v)],
      ].map(([label,_,type,val,fn])=>
        h('div',{key:label,className:'space-y-1'},
          h('label',{className:'text-xs font-medium text-slate-500'},label),
          h('input',{type,value:val,onChange:e=>fn(e.target.value),className:'w-full px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm'})
        )
      )
    ),
    h('div',{className:'space-y-1'},
      h('label',{className:'text-xs font-medium text-slate-500'},'وذلك عن'),
      h('input',{type:'text',value:inv.purpose,onChange:e=>set('purpose',e.target.value),placeholder:'سبب الدفع...',className:'w-full px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm'})
    ),
    h('div',{className:'space-y-1'},
      h('label',{className:'text-xs font-medium text-slate-500'},'ملاحظات'),
      h('textarea',{value:inv.notes,onChange:e=>set('notes',e.target.value),placeholder:'ملاحظات...',className:'w-full px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm h-16 resize-none'})
    )
  );

  return h('div',{className:'min-h-screen p-4 md:p-6',dir:'rtl'},
    h('div',{className:'max-w-6xl mx-auto flex flex-col md:flex-row gap-6'},

      // ── LEFT: FORM ──
      h('div',{className:'w-full md:w-80 flex-shrink-0 no-print space-y-4'},

        // Doc type toggle
        h('div',{className:'bg-white rounded-2xl p-1 flex shadow-sm border border-slate-200'},
          h('button',{
            onClick:()=>setDocType('sale'),
            className:`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${docType==='sale'?'bg-slate-900 text-white shadow':'text-slate-500 hover:text-slate-800'}`
          },'📋 قائمة بيع'),
          h('button',{
            onClick:()=>setDocType('receipt'),
            className:`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${docType==='receipt'?'bg-slate-900 text-white shadow':'text-slate-500 hover:text-slate-800'}`
          },'🧾 سند قبض'),
        ),

        // Form card
        h('div',{className:'bg-white rounded-2xl p-5 shadow-sm border border-slate-200'},
          docType==='sale'?saleForm:receiptForm
        ),

        // Buttons
        h('div',{className:'space-y-2'},
          h('button',{
            onClick:()=>window.print(),
            className:'w-full py-3 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 flex items-center justify-center gap-2'
          },'🖨️ طباعة'),
          h('button',{
            onClick:()=>sendToWhatsApp(inv,inv.items,total,docType),
            className:'w-full py-3 bg-green-600 text-white rounded-2xl font-bold hover:bg-green-700 flex items-center justify-center gap-2'
          },'💬 إرسال واتساب'),
        )
      ),

      // ── RIGHT: PREVIEW ──
      h('div',{className:'flex-1 flex justify-center'},
        h('div',{className:'bg-white shadow-2xl rounded-2xl overflow-hidden print-area a4-preview p-10'},
          docType==='sale'?salePreview:receiptPreview
        )
      )
    )
  );
}

createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
