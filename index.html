<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2744;--navy2:#243058;--blue:#2563eb;--green:#16a34a;
  --red:#dc2626;--amber:#d97706;--purple:#7c3aed;
  --bg:#e8edf4;--panel:#fff;--border:#d1d9e6;--text:#0f172a;
  --muted:#64748b;--row-even:#f7f9fc;--row-hover:#eef3fb;
  --sidebar-w:250px;--header-h:54px;
}
html,body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}
/* ── Header ── */
.app-header{height:var(--header-h);background:var(--navy);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;border-bottom:2px solid rgba(255,255,255,.07)}
.app-logo{font-weight:900;font-size:16px;color:#fff;white-space:nowrap}
.app-logo span{color:#93c5fd;font-size:11px;font-weight:600;display:block;margin-top:-2px}
.header-tabs{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:10px;padding:3px}
.header-tab{padding:6px 15px;border:none;background:transparent;color:rgba(255,255,255,.6);border-radius:7px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.header-tab.active{background:#fff;color:var(--navy)}
.header-tab:not(.active):hover{background:rgba(255,255,255,.12);color:#fff}
.header-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:5px 12px;color:rgba(255,255,255,.8);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;margin-right:auto}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* ── Layout ── */
.app-body{flex:1;overflow:hidden;display:flex}
.create-layout{display:flex;width:100%;height:100%;overflow:hidden}
/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--navy2);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.07);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
.sidebar-section{padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-label{font-size:10px;font-weight:800;letter-spacing:.8px;color:rgba(255,255,255,.35);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.sb-input{width:100%;padding:8px 10px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;color:#fff;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;transition:all .15s;outline:none}
.sb-input::placeholder{color:rgba(255,255,255,.3)}
.sb-input:focus{border-color:rgba(99,179,255,.5);background:rgba(255,255,255,.1)}
.sb-input option{background:var(--navy2);color:#fff}
.sb-row{display:flex;gap:7px}
.disc-toggle{display:flex;background:rgba(255,255,255,.07);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.disc-toggle button{flex:1;padding:7px;border:none;background:transparent;color:rgba(255,255,255,.5);font-family:'Cairo',sans-serif;font-weight:800;font-size:12px;cursor:pointer;transition:all .15s}
.disc-toggle button.active{background:var(--amber);color:#fff}
.sb-btn{width:100%;padding:10px;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.sb-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.sb-btn:active{transform:translateY(0)}
.btn-primary{background:#2563eb;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-purple{background:#7c3aed;color:#fff}
.btn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
/* ── Main area (invoice form) ── */
.main-scroll{flex:1;overflow:auto;background:var(--bg);padding:20px;display:flex;justify-content:center;align-items:flex-start}
/* ── A4 Invoice Sheet ── */
#invoice-sheet{
  width:794px;min-height:1123px;background:#fff;
  padding:36px 44px 28px;
  box-shadow:0 6px 40px rgba(0,0,0,.18);
  font-family:'Cairo',sans-serif;direction:rtl;
  position:relative;
  display:flex;flex-direction:column;
}
/* Inline inputs on the invoice (transparent, blends in) */
.inv-inp{
  border:none;border-bottom:1.5px dashed #d1d5db;background:transparent;
  font-family:'Cairo',sans-serif;outline:none;
  transition:background .12s,border-color .12s;
}
.inv-inp:focus{background:#eff6ff;border-bottom-color:#2563eb;border-radius:4px 4px 0 0}
.inv-inp::placeholder{color:#c4ccda}
/* Invoice items table */
.inv-tbl{width:100%;border-collapse:collapse}
.inv-tbl thead tr{background:#1a2744;height:36px}
.inv-tbl thead th{color:rgba(255,255,255,.85);font-weight:800;font-size:11px;padding:0 8px;text-align:center;border-left:1px solid rgba(255,255,255,.08);font-family:'Cairo',sans-serif;white-space:nowrap}
.inv-tbl thead th.col-name{text-align:right}
.inv-tbl tbody tr{height:34px;border-bottom:1px solid #e2e8f0}
.inv-tbl tbody tr:nth-child(even){background:#f8fafc}
.inv-tbl tbody tr:hover{background:#eff6ff}
.inv-tbl tbody td{border-left:1px solid #e2e8f0;padding:0;position:relative}
.inv-tbl tbody td:first-child{border-left:none;text-align:center;font-weight:800;font-size:12px;color:#94a3b8;font-family:'Cairo',sans-serif}
.cell-inp{width:100%;height:34px;padding:0 8px;border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;color:var(--text);outline:none;text-align:center}
.cell-inp.name-inp{text-align:right;padding:0 10px}
.cell-inp:focus{background:#dbeafe;box-shadow:inset 0 0 0 2px #2563eb}
.cell-inp[readonly]{color:var(--navy);font-weight:900;cursor:default;font-size:14px}
.cell-inp.green{color:#16a34a;font-weight:800}
.del-cell{width:34px;text-align:center}
.del-btn{width:100%;height:34px;border:none;background:transparent;color:#cbd5e1;cursor:pointer;font-size:14px;transition:color .1s}
.del-btn:hover{color:#dc2626;background:#fef2f2}
/* Autocomplete */
.ac-drop{position:fixed;z-index:99999;background:#fff;border:2px solid #2563eb;border-radius:10px;box-shadow:0 12px 40px rgba(37,99,235,.22);overflow:hidden;min-width:300px}
.ac-hdr{padding:5px 12px;font-size:10px;font-weight:800;color:#2563eb;background:#eff6ff;border-bottom:1px solid #bfdbfe}
.ac-item{padding:7px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid #f1f5f9;font-size:13px;font-weight:700;color:var(--text);transition:background .08s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:#eff6ff}
.ac-price{font-size:12px;font-weight:900;color:#2563eb;background:#eff6ff;padding:2px 8px;border-radius:99px;white-space:nowrap}
.ac-hl{background:#bfdbfe;border-radius:2px;padding:0 1px}
/* Records / full-tab */
.full-tab{flex:1;overflow:auto;padding:20px}
.full-tab::-webkit-scrollbar{width:5px}
.full-tab::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.rec-table{width:100%;border-collapse:collapse}
.rec-table th{padding:9px 11px;font-weight:800;font-size:11px;text-align:center;background:var(--navy);color:#fff;border-left:1px solid rgba(255,255,255,.07)}
.rec-table td{padding:8px 11px;font-size:12px;text-align:center;border-bottom:1px solid var(--border)}
.rec-table tbody tr:hover{background:var(--row-hover)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:14px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:11px 13px}
.stat-card-val{font-size:15px;font-weight:900}
.stat-card-lbl{font-size:10px;color:var(--muted);font-weight:700;margin-top:2px}
.type-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800}
.type-sale{background:#f0fdf4;color:#16a34a}
.type-receipt{background:#eff6ff;color:#2563eb}
/* Inventory */
.profit-banner{background:linear-gradient(135deg,#14532d,#16a34a);border-radius:14px;padding:16px 18px;color:#fff;margin-bottom:14px}
.profit-banner.loss{background:linear-gradient(135deg,#7f1d1d,#dc2626)}
.edit-input{padding:3px 7px;border:1.5px solid #bfdbfe;border-radius:6px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:600;outline:none}
/* Loading / Toast */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.75);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loading-overlay.on{display:flex}
#loading-overlay p{color:#fff;font-family:'Cairo',sans-serif;font-size:17px;font-weight:700}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:#fff;padding:11px 22px;border-radius:12px;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;transition:transform .3s,opacity .3s;opacity:0;z-index:9000;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.err{background:#dc2626}
#toast.ok{background:#16a34a}
input:focus,select:focus,textarea:focus{outline:none}
/* print: hide controls */
@media print{.sidebar,.del-btn,.add-row-btn,button{display:none!important}}

let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+(type==='error'?'err':type==='success'?'ok':'');
  clearTimeout(_tt);_tt=setTimeout(()=>{el.className='';},3200);

const fmt=n=>Number(n||0).toLocaleString();
const IQ=n=>fmt(n)+' د.ع';
function toWA(phone){let p=phone.replace(/\D/g,'');if(p.startsWith('00'))p=p.slice(2);if(p.startsWith('0'))p='964'+p.slice(1);if(!p.startsWith('964'))p='964'+p;return p;}

/* تاريخ اليوم */
const todayDate=new Date().toISOString().split('T')[0];

async function getNextInvoiceNumber(){
  const now=new Date();const month=now.getMonth()+1;const ym=now.toISOString().slice(0,7);
  try{const{count}=await sb.from('invoices').select('id',{count:'exact',head:true}).gte('date',ym+'-01').lte('date',ym+'-31');return`${month}-${(count||0)+1}`;}
  catch{return`${month}-1`;}
}

async function saveToSupabase(inv,subtotal,discountVal,finalTotal,paid,due){
  try{
    const{error}=await sb.from('invoices').insert({
      invoice_number:inv.invoiceNumber,date:inv.date,
      customer_name:inv.customerName,customer_phone:inv.customerPhone,
      invoice_type:inv.invoiceType,items:inv.items,
      subtotal:finalTotal,paid_amount:paid,due_amount:due,
      notes:inv.notes
    });
    if(error)throw error;
    /* خصم الكميات من المخزون عند البيع */
    if(inv.invoiceType==='sale'){
      const itemsToDeduct=inv.items.filter(it=>it.description&&Number(it.quantity)>0);
      if(itemsToDeduct.length>0){
        const names=itemsToDeduct.map(it=>it.description);
        const{data:prods}=await sb.from('products').select('id,name,quantity').in('name',names);
        if(prods&&prods.length>0){
          await Promise.all(prods.map(prod=>{
            const soldQty=itemsToDeduct.filter(it=>it.description===prod.name).reduce((s,it)=>s+Number(it.quantity||0),0);
            const newQty=Math.max(0,Number(prod.quantity||0)-soldQty);
            return sb.from('products').update({quantity:newQty}).eq('id',prod.id);
          }));
        }
      }
    }
    return true;
  }catch(e){console.error(e);return false;}
}

/* ══ AutocompleteCell ══ */
function AutocompleteCell({value,onSelect,products,inputRef,onKeyDown,onFocus}){
  const [open,setOpen]=useState(false);
  const [selIdx,setSelIdx]=useState(-1);
  const [pos,setPos]=useState({top:0,right:0,width:0});
  const wRef=useRef(null);

  const suggestions=useMemo(()=>{
    const q=(value||'').trim().toLowerCase();
    if(!q)return products.slice(0,10);
    return products.filter(p=>p.name.toLowerCase().includes(q)).slice(0,10);
  },[value,products]);

  useEffect(()=>{
    const h=e=>{if(wRef.current&&!wRef.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  const updatePos=()=>{
    if(!wRef.current)return;
    const r=wRef.current.getBoundingClientRect();
    setPos({top:r.bottom+3,right:window.innerWidth-r.right,width:Math.max(r.width,300)});
  };

  const pick=prod=>{onSelect(prod.name,Number(prod.sell_price)||0,Number(prod.cost_price)||0);setOpen(false);setSelIdx(-1);};

  const handleKey=e=>{
    if(!open){onKeyDown&&onKeyDown(e);return;}
    if(e.key==='ArrowDown'){e.preventDefault();setSelIdx(i=>Math.min(i+1,suggestions.length-1));return;}
    if(e.key==='ArrowUp'){e.preventDefault();setSelIdx(i=>Math.max(i-1,-1));return;}
    if(e.key==='Enter'&&selIdx>=0){e.preventDefault();pick(suggestions[selIdx]);return;}
    if(e.key==='Escape'){setOpen(false);setSelIdx(-1);return;}
    onKeyDown&&onKeyDown(e);
  };

  const hl=text=>{
    const q=(value||'').trim();if(!q)return text;
    const idx=text.toLowerCase().indexOf(q.toLowerCase());if(idx===-1)return text;
    return<>{text.slice(0,idx)}<span className="ac-hl">{text.slice(idx,idx+q.length)}</span>{text.slice(idx+q.length)}</>;
  };

  return(
    <div ref={wRef} style={{position:'relative',width:'100%'}}>
      <input ref={inputRef} className="cell-inp name-inp" value={value}
        placeholder="اسم المادة..." autoComplete="off"
        onChange={e=>{onSelect(e.target.value,null,null);updatePos();setOpen(true);setSelIdx(-1);}}
        onFocus={()=>{updatePos();setOpen(true);onFocus&&onFocus();}}
        onKeyDown={handleKey}/>
      {open&&suggestions.length>0&&(
        <div className="ac-drop" style={{top:pos.top,right:pos.right,width:pos.width}}>
          <div className="ac-hdr">▼ اختر من المخزن</div>
          {suggestions.map((prod,i)=>(
            <div key={prod.name} className={`ac-item${i===selIdx?' sel':''}`}
              onMouseDown={e=>{e.preventDefault();pick(prod);}}>
              <span>{hl(prod.name)}</span>
              {Number(prod.sell_price)>0&&<span className="ac-price">{Number(prod.sell_price).toLocaleString()} د.ع</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   CreateView  —  WYSIWYG A4 Invoice
══════════════════════════════════════ */
function CreateView({products,loadedRow,onLoadDone}){
  const sheetRef=useRef(null);
  const cellRefs=useRef({});

  const newItem=()=>({id:Date.now().toString()+Math.random(),description:'',quantity:1,price:'',cost_price:0});

  const blankInv=()=>({
    invoiceNumber:'...',date:new Date().toISOString().split('T')[0],
    customerName:'',customerPhone:'',
    items:[newItem()],invoiceType:'sale',paidAmount:'',
    discount:'',discountType:'amount',
    notes:'البضاعة المباعة لا ترد ولا تستبدل بعد 24 ساعة.'
  });

  const [inv,setInv]=useState(blankInv);
  const [activeRow,setActiveRow]=useState(null);
  const [printMode,setPrintMode]=useState(false);
  const [isEditMode,setIsEditMode]=useState(false);

  useEffect(()=>{getNextInvoiceNumber().then(n=>setInv(p=>({...p,invoiceNumber:n})));},[]);

  useEffect(()=>{
    if(!loadedRow)return;
    const items=(loadedRow.items||[]).map(it=>({
      id:Date.now().toString()+Math.random(),
      description:it.description||'',quantity:it.quantity||1,
      price:it.price||'',cost_price:it.cost_price||0
    }));
    setInv({
      invoiceNumber:loadedRow.invoice_number||'',
      date:loadedRow.date||new Date().toISOString().split('T')[0],
      customerName:loadedRow.customer_name||'',
      customerPhone:loadedRow.customer_phone||'',
      items:items.length>0?items:[newItem()],
      invoiceType:loadedRow.invoice_type||'sale',
      paidAmount:(loadedRow.paid_amount||0).toString(),
      discount:'',discountType:'amount',
      notes:loadedRow.notes||''
    });
    setIsEditMode(true);
    onLoadDone();
  },[loadedRow]);

  const subtotal=useMemo(()=>inv.items.reduce((s,it)=>s+(Number(it.quantity||0)*Number(it.price||0)),0),[inv.items]);
  const discountVal=useMemo(()=>{
    const d=Number(inv.discount||0);if(d<=0)return 0;
    return inv.discountType==='percent'?Math.round(subtotal*d/100):d;
  },[inv.discount,inv.discountType,subtotal]);
  const finalTotal=Math.max(0,subtotal-discountVal);
  const paidRaw=inv.paidAmount===''?finalTotal:Number(inv.paidAmount)||0;
  const paid=Math.min(paidRaw,finalTotal);
  const due=Math.max(0,finalTotal-paid);

  const setField=(k,v)=>setInv(p=>({...p,[k]:v}));

  const updateItem=useCallback((id,field,value)=>{
    setInv(p=>({...p,items:p.items.map(it=>it.id===id?{...it,[field]:value}:it)}));
  },[]);

  const selectProduct=useCallback((id,name,sellPrice,costPrice)=>{
    setInv(p=>({...p,items:p.items.map(it=>
      it.id===id?{...it,description:name,
        ...(sellPrice!==null&&sellPrice>0?{price:sellPrice}:{}),
        cost_price:costPrice||0}:it
    )}));
  },[]);

  const addRow=()=>{
    const item=newItem();
    setInv(p=>({...p,items:[...p.items,item]}));
    setTimeout(()=>{const r=cellRefs.current[`n-${item.id}`];if(r)r.focus();},50);
  };
  const removeItem=id=>setInv(p=>({...p,items:p.items.filter(it=>it.id!==id)}));

  const resetInvoice=async()=>{
    const n=await getNextInvoiceNumber();
    setInv({...blankInv(),invoiceNumber:n});setActiveRow(null);setIsEditMode(false);
  };

  const handleCellKey=(e,itemId,field)=>{
    if(e.key==='Tab'||e.key==='Enter'){
      e.preventDefault();
      const order=['n','q','p'];const ci=order.indexOf(field);
      if(ci<order.length-1){const r=cellRefs.current[`${order[ci+1]}-${itemId}`];if(r)r.focus();}
      else{
        const items=inv.items;const ri=items.findIndex(it=>it.id===itemId);
        if(ri<items.length-1){const r=cellRefs.current[`n-${items[ri+1].id}`];if(r)r.focus();}
        else addRow();
      }
    }
  };

  const exportPDF=async()=>{
    const el=sheetRef.current;
    await new Promise(r=>setTimeout(r,80));
    await html2pdf().set({
      margin:0,filename:`فاتورة-${inv.invoiceNumber}.pdf`,
      image:{type:'jpeg',quality:.98},
      html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(el).save();
  };

  const handlePDF=async()=>{
    showLoading('جاري إنشاء PDF...');
    try{
      if(!isEditMode)await saveToSupabase(inv,subtotal,discountVal,finalTotal,paid,due);
      setPrintMode(true);
      await new Promise(r=>setTimeout(r,120));
      await exportPDF();
      setPrintMode(false);
      toast('تم الحفظ وتصدير PDF ✓','success');
      await resetInvoice();
    }catch(e){setPrintMode(false);toast('خطأ','error');console.error(e);}
    hideLoading();
  };

  const handleWA=async()=>{
    if(!inv.customerPhone){toast('أدخل رقم الهاتف','error');return;}
    showLoading('جاري تجهيز الصورة...');
    try{
      await document.fonts.ready;
      if(!isEditMode)await saveToSupabase(inv,subtotal,discountVal,finalTotal,paid,due);
      setPrintMode(true);
      await new Promise(r=>setTimeout(r,120));
      const el=sheetRef.current;
      const dataUrl=await domtoimage.toPng(el,{quality:1,bgcolor:'#ffffff',style:{direction:'rtl',fontFamily:"'Cairo',sans-serif"}});
      setPrintMode(false);
      const blob=await(await fetch(dataUrl)).blob();
      const file=new File([blob],`فاتورة-${inv.invoiceNumber}.png`,{type:'image/png'});
      const wa=toWA(inv.customerPhone);
      hideLoading();
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'فاتورة عالم ورق الكاشير'});
      }else{
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download=`فاتورة-${inv.invoiceNumber}.png`;
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(url),1000);
        const msg=encodeURIComponent(`مرحباً ${inv.customerName}،\nفاتورة رقم ${inv.invoiceNumber} من عالم ورق الكاشير.`);
        setTimeout(()=>window.open(`https://wa.me/${wa}?text=${msg}`,'_blank'),800);
      }
      toast('تم الإرسال والحفظ ✓','success');
      await resetInvoice();
    }catch(e){setPrintMode(false);hideLoading();if(e.name!=='AbortError'){toast('خطأ','error');console.error(e);}}
  };

  const handleSave=async()=>{
    showLoading('جاري الحفظ...');
    const ok=isEditMode?true:await saveToSupabase(inv,subtotal,discountVal,finalTotal,paid,due);
    hideLoading();
    if(ok){toast(isEditMode?'تم عرض الفاتورة (لم تُحفظ مجدداً) ✓':'تم الحفظ ✓','success');await resetInvoice();}
    else toast('فشل الحفظ','error');
  };

  const F={fontFamily:"'Cairo',sans-serif"};

  const II=(extra={})=>({...extra,border:'none',borderBottom:'1.5px dashed #c4ccda',
    background:'transparent',fontFamily:"'Cairo',sans-serif",outline:'none',
    transition:'background .12s,border-color .12s',});

  const renderItems=()=>(
    inv.items.filter(it=>it.description||!printMode).map((item,i)=>{
      const total=Number(item.quantity||0)*Number(item.price||0);
      if(printMode){
        return(
          <tr key={item.id} style={{height:'30px',borderBottom:'1px solid #e2e8f0',background:i%2===0?'#fff':'#f8fafc'}}>
            <td style={{textAlign:'center',fontWeight:800,fontSize:'12px',color:'#94a3b8',...F}}>{i+1}</td>
            <td style={{textAlign:'right',padding:'0 10px',fontWeight:700,fontSize:'12.5px',color:'#0f172a',...F}}>{item.description}</td>
            <td style={{textAlign:'center',fontWeight:700,fontSize:'12px',...F}}>{item.quantity}</td>
            <td style={{textAlign:'center',fontWeight:700,fontSize:'12px',color:'#16a34a',...F}}>{Number(item.price||0).toLocaleString()}</td>
            <td style={{textAlign:'center',fontWeight:900,fontSize:'13px',color:'#1a2744',...F}}>{total>0?total.toLocaleString():''}</td>
          </tr>
        );
      }
      return(
        <tr key={item.id} style={{height:'34px',borderBottom:'1px solid #e2e8f0',background:activeRow===item.id?'#eff6ff':i%2===0?'#fff':'#f8fafc'}}>
          <td style={{textAlign:'center',fontWeight:800,fontSize:'12px',color:'#94a3b8',...F}}>{i+1}</td>
          <td style={{padding:'0'}}>
            <AutocompleteCell value={item.description} products={products}
              onSelect={(name,price,costPrice)=>selectProduct(item.id,name,price,costPrice)}
              inputRef={el=>cellRefs.current[`n-${item.id}`]=el}
              onKeyDown={e=>handleCellKey(e,item.id,'n')}
              onFocus={()=>setActiveRow(item.id)}/>
          </td>
          <td style={{padding:'0'}}>
            <input ref={el=>cellRefs.current[`q-${item.id}`]=el}
              type="number" className="cell-inp" value={item.quantity} min="0"
              onChange={e=>updateItem(item.id,'quantity',e.target.value)}
              onFocus={()=>setActiveRow(item.id)} onKeyDown={e=>handleCellKey(e,item.id,'q')}/>
          </td>
          <td style={{padding:'0'}}>
            <input ref={el=>cellRefs.current[`p-${item.id}`]=el}
              type="number" className={`cell-inp${Number(item.price)>0?' green':''}`}
              value={item.price} min="0" placeholder="0"
              onChange={e=>updateItem(item.id,'price',e.target.value)}
              onFocus={()=>setActiveRow(item.id)} onKeyDown={e=>handleCellKey(e,item.id,'p')}/>
          </td>
          <td style={{padding:'0'}}>
            <input className="cell-inp" style={{color:'#1a2744',fontWeight:900,fontSize:14}} value={total>0?total.toLocaleString():''} readOnly tabIndex={-1}/>
          </td>
          <td className="del-cell"><button className="del-btn" onClick={()=>removeItem(item.id)}>✕</button></td>
        </tr>
      );
    })
  );

  const TotalBox=()=>(
    <div style={{width:'44%',border:'2.5px solid #1a2744',borderRadius:'10px',overflow:'hidden'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 14px',borderBottom:'1px solid #e2e8f0',background:'#f8fafc'}}>
        <span style={{fontWeight:900,fontSize:'15px',color:'#1a2744',...F}}>{subtotal.toLocaleString()} <span style={{fontSize:10,color:'#94a3b8'}}>د.ع</span></span>
        <span style={{fontWeight:800,fontSize:'11px',color:'#64748b',...F}}>المجموع الكلي</span>
      </div>
      {discountVal>0&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 14px',borderBottom:'1px solid #e2e8f0',background:'#fffbeb'}}>
          <span style={{fontWeight:900,fontSize:'14px',color:'#d97706',...F}}>- {discountVal.toLocaleString()} <span style={{fontSize:10}}>د.ع</span></span>
          <span style={{fontWeight:800,fontSize:'11px',color:'#d97706',...F}}>خصم {inv.discountType==='percent'?`${inv.discount}%`:''}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 14px',borderBottom:'1px solid #e2e8f0',background:'#f0fdf4'}}>
          <span style={{fontWeight:900,fontSize:'14px',color:'#16a34a',...F}}>{finalTotal.toLocaleString()} <span style={{fontSize:10}}>د.ع</span></span>
          <span style={{fontWeight:800,fontSize:'11px',color:'#16a34a',...F}}>بعد الخصم</span>
        </div>
      </>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 14px',borderBottom:'1px solid #e2e8f0',background:'#fff'}}>
        {printMode
          ?<span style={{fontWeight:900,fontSize:'15px',color:'#0f172a',...F}}>{paid.toLocaleString()} <span style={{fontSize:10,color:'#94a3b8'}}>د.ع</span></span>
          :<input type="number" value={inv.paidAmount} onChange={e=>setField('paidAmount',e.target.value)}
              placeholder={finalTotal>0?finalTotal.toLocaleString():'المبلغ الواصل'}
              style={{border:'none',background:'transparent',fontFamily:"'Cairo',sans-serif",fontWeight:900,fontSize:'15px',color:'#0f172a',width:'160px',outline:'none',textAlign:'left',direction:'ltr'}}/>
        }
        <span style={{fontWeight:800,fontSize:'11px',color:'#475569',...F}}>
          {inv.paidAmount===''?'الواصل (المجموع كاملاً)':'الواصل (جزئي)'}
        </span>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:due>0?'#dc2626':'#1a2744'}}>
        <span style={{fontWeight:900,fontSize:'20px',color:'#fff',...F}}>{due.toLocaleString()} <span style={{fontSize:10,opacity:.75}}>د.ع</span></span>
        <span style={{fontWeight:900,fontSize:'12px',color:'rgba(255,255,255,.85)',...F}}>
          {due<=0?'✅ مسدد بالكامل':'الباقي المستحق'}
        </span>
      </div>
    </div>
  );

  return(
    <div className="create-layout">
      <div className="sidebar">
        <div className="sidebar-section">
          <div className="sidebar-label">🧾 نوع الوصل</div>
          <select value={inv.invoiceType} onChange={e=>setField('invoiceType',e.target.value)} className="sb-input">
            <option value="sale">قائمة بيع</option>
            <option value="receipt">سند قبض</option>
          </select>
        </div>
        <div className="sidebar-section">
          <div className="sidebar-label">🏷️ الخصم</div>
          <div className="disc-toggle" style={{marginBottom:7}}>
            <button className={inv.discountType==='amount'?'active':''} onClick={()=>setField('discountType','amount')}>مبلغ</button>
            <button className={inv.discountType==='percent'?'active':''} onClick={()=>setField('discountType','percent')}>نسبة%</button>
          </div>
          <input type="number" value={inv.discount}
            onChange={e=>setField('discount',e.target.value)}
            placeholder={inv.discountType==='percent'?'0 %':'0 د.ع'}
            className="sb-input"
            style={{fontSize:17,fontWeight:900,color:'#fcd34d',textAlign:'center'}}
            min="0" max={inv.discountType==='percent'?100:undefined}/>
          {discountVal>0&&<div style={{marginTop:6,background:'rgba(253,211,77,.1)',border:'1px solid rgba(253,211,77,.25)',borderRadius:8,padding:'5px 10px',color:'#fcd34d',fontSize:12,fontWeight:800,textAlign:'center'}}>
            وفّر: {fmt(discountVal)} د.ع
          </div>}
        </div>
        <div className="sidebar-section">
          <div className="sidebar-label">📝 ملاحظات</div>
          <textarea value={inv.notes} onChange={e=>setField('notes',e.target.value)} rows={3}
            className="sb-input" style={{resize:'vertical',lineHeight:1.8,fontSize:12}}/>
        </div>
        <div className="sidebar-section">
          <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
            {[
              [fmt(subtotal),'المجموع','#93c5fd'],
              [fmt(paid),'مدفوع','#86efac'],
              [fmt(due),due>0?'متبقي':'مسدد',due>0?'#fca5a5':'#86efac'],
            ].map(([v,l,c])=>(
              <div key={l} style={{flex:1,background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.07)',borderRadius:9,padding:'7px 8px',textAlign:'center',minWidth:60}}>
                <div style={{fontSize:13,fontWeight:900,color:c,...F}}>{v}</div>
                <div style={{fontSize:9,color:'rgba(255,255,255,.4)',marginTop:2,...F}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="sidebar-section" style={{display:'flex',flexDirection:'column',gap:7}}>
          {isEditMode&&(
            <div style={{background:'rgba(253,211,77,.15)',border:'1px solid rgba(253,211,77,.4)',borderRadius:8,padding:'6px 10px',color:'#fcd34d',fontSize:11,fontWeight:800,textAlign:'center'}}>
              ✏️ وضع العرض — لن تُحفظ مجدداً
            </div>
          )}
          <button className="sb-btn btn-primary" onClick={handlePDF}><Icons.PDF/> {isEditMode?'طباعة PDF':'PDF + حفظ'}</button>
          <button className="sb-btn btn-green"   onClick={handleWA}><Icons.WA/>  {isEditMode?'إرسال واتساب':'واتساب + حفظ'}</button>
          <button className="sb-btn btn-purple"  onClick={handleSave}><Icons.Save/> {isEditMode?'إغلاق':'حفظ'}</button>
          <button className="sb-btn btn-ghost"   onClick={resetInvoice}><Icons.New/> فاتورة جديدة</button>
          <button className="sb-btn btn-ghost" style={{marginTop:2}} onClick={addRow}><Icons.Plus/> إضافة صف</button>
        </div>
        <div style={{padding:'10px',textAlign:'center'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:5,fontSize:11,color:'rgba(255,255,255,.35)',fontWeight:700}}>
            <div className="pulse-dot"></div> متصل بقاعدة البيانات
          </div>
        </div>
      </div>

      <div className="main-scroll">
        <div id="invoice-sheet" ref={sheetRef}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'3px solid #1a2744',paddingBottom:'16px',marginBottom:'14px'}}>
            <div>
              <div style={{fontSize:'26px',fontWeight:900,color:'#1a2744',lineHeight:1.1,...F}}>عالم ورق الكاشير</div>
              <div style={{fontSize:'11px',fontWeight:700,color:'#2563eb',marginTop:'3px',...F}}>الجودة التي تستحقها تجارتكم</div>
            </div>
            <img src="logo.PNG" alt="" style={{height:'110px',width:'auto',maxWidth:'170px',objectFit:'contain'}} onError={e=>{e.target.style.display='none';}}/>
          </div>

          <div style={{display:'flex',justifyContent:'center',marginBottom:'13px'}}>
            <div style={{border:'2px solid #1a2744',borderRadius:'8px',padding:'3px 40px',background:'#f8fafc'}}>
              <span style={{fontSize:'17px',fontWeight:900,color:'#1a2744',...F}}>
                {inv.invoiceType==='receipt'?'سند قبض':'قائمة بيع'}
              </span>
            </div>
          </div>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'10px',padding:'10px 14px',marginBottom:'14px',gap:'16px'}}>
            <div style={{flex:1,display:'flex',flexDirection:'column',gap:'9px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{fontWeight:700,color:'#64748b',fontSize:'12px',whiteSpace:'nowrap',...F}}>السيد/ة:</span>
                {printMode
                  ?<span style={{fontWeight:800,fontSize:'15px',color:'#0f172a',...F}}>{inv.customerName||'—'}</span>
                  :<input value={inv.customerName} onChange={e=>setField('customerName',e.target.value)}
                      placeholder="اسم الزبون" style={II({flex:1,fontSize:'15px',fontWeight:800,color:'#0f172a',paddingBottom:'2px'})}/>
                }
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{fontWeight:700,color:'#64748b',fontSize:'12px',whiteSpace:'nowrap',...F}}>الهاتف:</span>
                {printMode
                  ?<span style={{fontWeight:700,fontSize:'13px',color:'#475569',direction:'ltr',...F}}>{inv.customerPhone||'—'}</span>
                  :<input type="tel" value={inv.customerPhone} onChange={e=>setField('customerPhone',e.target.value)}
                      placeholder="رقم الهاتف" dir="ltr"
                      style={II({flex:1,fontSize:'13px',fontWeight:700,direction:'ltr',paddingBottom:'2px'})}/>
                }
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'9px',alignItems:'flex-end'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{fontWeight:700,color:'#64748b',fontSize:'12px',...F}}>رقم الوصل:</span>
                {printMode
                  ?<span style={{fontWeight:900,fontSize:'20px',color:'#1a2744',...F}}>{inv.invoiceNumber}</span>
                  :<input value={inv.invoiceNumber} onChange={e=>setField('invoiceNumber',e.target.value)}
                      style={II({width:'75px',fontSize:'20px',fontWeight:900,color:'#1a2744',textAlign:'center'})}/>
                }
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>

/* ══════════════════════════════════════
   InventoryView  —  أرباح حقيقية دقيقة

function InventoryView(){
  const [products, setProducts] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [section,  setSection]  = useState('products');
  const [editId,   setEditId]   = useState(null);
  const [editData, setEditData] = useState({});
  const [newProd,  setNewProd]  = useState({name:'',cost_price:'',sell_price:'',quantity:'',category:''});
  const [showAddForm,setShowAddForm]=useState(false);
  const [stockModal,setStockModal]=useState(null);
  const [newExp,   setNewExp]   = useState({description:'',amount:'',date:new Date().toISOString().split('T')[0],category:''});
  const [sortBy,   setSortBy]   = useState('profit_total');
  const [sortDir,  setSortDir]  = useState('desc');
  const [filterCat,setFilterCat]= useState('');
  const [productSearch,setProductSearch]=useState('');
  const [profitDateFrom,setProfitDateFrom]=useState('');
  const [profitDateTo,setProfitDateTo]=useState('');
  const [profitCat,setProfitCat]=useState('');
  const [dbReady,  setDbReady]  = useState(true);

  useEffect(()=>{loadAll();},[]);

  const loadAll=async()=>{
    setLoading(true);
    try{
      const[pr,ex,inv]=await Promise.all([
        sb.from('products').select('*').order('name'),
        sb.from('expenses').select('*').order('date',{ascending:false}),
        sb.from('invoices').select('items,invoice_type,subtotal,paid_amount,date').eq('invoice_type','sale'),
      ]);
      if(pr.error){setDbReady(false);setLoading(false);return;}
      setProducts(pr.data||[]);setExpenses(ex.data||[]);setInvoices(inv.data||[]);setDbReady(true);
    }catch(e){setDbReady(false);}
    setLoading(false);
  };

  const addProduct=async()=>{
    if(!newProd.name){toast('أدخل اسم المنتج','error');return;}
    const{error}=await sb.from('products').insert({name:newProd.name,cost_price:Number(newProd.cost_price)||0,sell_price:Number(newProd.sell_price)||0,quantity:Number(newProd.quantity)||0,category:newProd.category||''});
    if(error){toast('فشل: '+error.message,'error');return;}
    toast('تم الإضافة ✓','success');setNewProd({name:'',cost_price:'',sell_price:'',quantity:'',category:''});loadAll();
  };
  const delProduct=async id=>{if(!confirm('حذف؟'))return;await sb.from('products').delete().eq('id',id);toast('تم الحذف','success');loadAll();};
  const startEdit=row=>{setEditId(row.id);setEditData({...row});};
  const quickStock=async(prod,delta)=>{
    const newQty=Math.max(0,Number(prod.quantity||0)+delta);
    await sb.from('products').update({quantity:newQty}).eq('id',prod.id);
    loadAll();
  };
  const openStockModal=prod=>setStockModal({product:prod,inputVal:String(prod.quantity||0)});
  const saveStockModal=async()=>{
    if(!stockModal)return;
    const newQty=Math.max(0,Number(stockModal.inputVal)||0);
    await sb.from('products').update({quantity:newQty}).eq('id',stockModal.product.id);
    toast('تم تحديث المخزون ✓','success');setStockModal(null);loadAll();
  };
  const saveEdit=async()=>{
    await sb.from('products').update({name:editData.name,cost_price:Number(editData.cost_price)||0,sell_price:Number(editData.sell_price)||0,quantity:Number(editData.quantity)||0,category:editData.category||''}).eq('id',editId);
    toast('تم الحفظ ✓','success');setEditId(null);loadAll();
  };

  const addExpense=async()=>{
    if(!newExp.description||!newExp.amount){toast('أدخل الوصف والمبلغ','error');return;}
    await sb.from('expenses').insert({description:newExp.description,amount:Number(newExp.amount)||0,date:newExp.date,category:newExp.category||''});
    toast('تم الإضافة ✓','success');setNewExp({description:'',amount:'',date:new Date().toISOString().split('T')[0],category:''});loadAll();
  };
  const delExpense=async id=>{if(!confirm('حذف؟'))return;await sb.from('expenses').delete().eq('id',id);toast('تم الحذف','success');loadAll();};

  const salesStats=useMemo(()=>{
    let totalRevenue=0,totalCOGS=0;
    const byName={};

    const filteredInvoices=invoices.filter(inv=>{
      if(profitDateFrom&&inv.date<profitDateFrom)return false;
      if(profitDateTo&&inv.date>profitDateTo)return false;
      return true;
    });

    const filteredExpenses=profitDateFrom||profitDateTo
      ?expenses.filter(e=>{
          if(profitDateFrom&&e.date<profitDateFrom)return false;
          if(profitDateTo&&e.date>profitDateTo)return false;
          return true;
        })
      :expenses;

    filteredInvoices.forEach(inv=>{
      const items=Array.isArray(inv.items)?inv.items:[];
      const actualInvRevenue=Number(inv.subtotal||0);
      const rawItemsTotal=items.reduce((s,it)=>s+(Number(it.quantity)||0)*(Number(it.price)||0),0);
      const discRatio=rawItemsTotal>0?actualInvRevenue/rawItemsTotal:1;

      let invCOGS=0;
      items.forEach(it=>{
        if(!it.description||!it.price)return;
        if(profitCat){
          const prod=products.find(p=>p.name===it.description);
          if(!prod||prod.category!==profitCat)return;
        }
        const qty=Number(it.quantity)||0;
        const sellPrice=Number(it.price)||0;
        let costPrice=Number(it.cost_price)||0;
        if(costPrice===0){
          const prod=products.find(p=>p.name===it.description);
          if(prod)costPrice=Number(prod.cost_price)||0;
        }
        const effectiveRevenue=(qty*sellPrice)*discRatio;
        const cogs=qty*costPrice;
        invCOGS+=cogs;

        if(!byName[it.description])byName[it.description]={qty_sold:0,revenue:0,cogs:0,profit:0};
        byName[it.description].qty_sold+=qty;
        byName[it.description].revenue+=effectiveRevenue;
        byName[it.description].cogs+=cogs;
        byName[it.description].profit+=effectiveRevenue-cogs;
      });
      totalRevenue+=Number(inv.subtotal||0);
      totalCOGS+=invCOGS;
    });
    if(profitCat){
      totalRevenue=Object.values(byName).reduce((s,v)=>s+v.revenue,0);
      totalCOGS=Object.values(byName).reduce((s,v)=>s+v.cogs,0);
    }
    const filteredExpensesTotal=filteredExpenses.filter(e=>!profitCat||(e.category===profitCat)).reduce((s,e)=>s+Number(e.amount||0),0);
    return{byName,totalRevenue,totalCOGS,realizedProfit:totalRevenue-totalCOGS,filteredExpensesTotal};
  },[invoices,products,profitDateFrom,profitDateTo,profitCat,expenses]);

  const totalExpenses=salesStats.filteredExpensesTotal!==undefined?salesStats.filteredExpensesTotal:expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const netProfit=salesStats.realizedProfit-totalExpenses;
  const totalUnits=products.reduce((s,p)=>s+Number(p.quantity||0),0);
  const categories=[...new Set(products.map(p=>p.category).filter(Boolean))];

  const enriched=useMemo(()=>products.map(p=>{
    const s=salesStats.byName[p.name]||{qty_sold:0,revenue:0,cogs:0,profit:0};
    const unitProfit=Number(p.sell_price)-Number(p.cost_price);
    const margin=Number(p.sell_price)>0?Math.round((unitProfit/Number(p.sell_price))*100):0;
    return{...p,...s,unitProfit,margin};
  }),[products,salesStats]);

  const sorted=useMemo(()=>{
    let arr=[...enriched];
    if(filterCat)arr=arr.filter(p=>p.category===filterCat);
    if(productSearch){const q=productSearch.toLowerCase();arr=arr.filter(p=>p.name.toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q));}
    arr.sort((a,b)=>{
      if(sortBy==='name')return sortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name);
      const keyMap={profit_total:'profit',profit_unit:'unitProfit',margin:'margin',qty_sold:'qty_sold',revenue:'revenue',quantity:'quantity',sell_price:'sell_price',cost_price:'cost_price'};
      const k=keyMap[sortBy]||'profit';
      const va=a[k]||0,vb=b[k]||0;
      return sortDir==='asc'?va-vb:vb-va;
    });
    return arr;
  },[enriched,sortBy,sortDir,filterCat]);

  const toggleSort=col=>{if(sortBy===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortBy(col);setSortDir('desc');}};

  const F={fontFamily:'Cairo,sans-serif'};

  const sqlText=`create table products(\n  id uuid primary key default gen_random_uuid(),\n  name text not null,\n  cost_price numeric default 0,\n  sell_price numeric default 0,\n  quantity numeric default 0,\n  category text default '',\n  created_at timestamptz default now()\n);\ncreate table expenses(\n  id uuid primary key default gen_random_uuid(),\n  description text not null,\n  amount numeric default 0,\n  date date default current_date,\n  category text default '',\n  created_at timestamptz default now()\n);\nalter table products enable row level security;\ncreate policy "all" on products for all using (true) with check (true);\nalter table expenses enable row level security;\ncreate policy "all" on expenses for all using (true) with check (true);`;

  if(!dbReady)return(
    <div className="full-tab"><div className="card">
      <div style={{textAlign:'center',marginBottom:16}}>
        <div style={{fontSize:36,marginBottom:8}}>⚠️</div>
        <h2 style={{fontWeight:900,fontSize:16,color:'#dc2626',margin:'0 0 6px',...F}}>الجداول غير موجودة في Supabase</h2>
      </div>
      <pre style={{background:'#0f172a',color:'#e2e8f0',padding:16,borderRadius:10,fontSize:11,overflowX:'auto',lineHeight:1.8,direction:'ltr',textAlign:'left',fontFamily:'monospace'}}>{sqlText}</pre>
      <button onClick={()=>{navigator.clipboard.writeText(sqlText);toast('تم النسخ ✓','success');}}
        style={{marginTop:12,padding:'9px 18px',background:'#1a2744',color:'#fff',border:'none',borderRadius:9,fontWeight:800,fontSize:13,cursor:'pointer',width:'100%',...F}}>📋 نسخ SQL</button>
      <button onClick={loadAll} style={{marginTop:7,padding:'9px 18px',background:'#f1f5f9',color:'#1a2744',border:'1px solid #e2e8f0',borderRadius:9,fontWeight:800,fontSize:13,cursor:'pointer',width:'100%',...F}}>🔄 إعادة المحاولة</button>
    </div></div>
  );

  const ITab=({id,lbl,icon})=>(
    <button onClick={()=>setSection(id)} style={{padding:'7px 16px',border:'none',background:section===id?'#1a2744':'transparent',color:section===id?'#fff':'#64748b',borderRadius:8,fontWeight:800,fontSize:13,cursor:'pointer',...F}}>
      {icon} {lbl}
    </button>
  );

  return(
    <div className="full-tab">
      <div className="stats-grid" style={{marginBottom:14}}>
        {[
          ['🧾 إيرادات البيع (فعلي)',IQ(salesStats.totalRevenue),'#1a2744'],
          ['📦 تكلفة المباع (فعلي)',IQ(salesStats.totalCOGS),'#64748b'],
          ['📈 ربح إجمالي بعد البيع',IQ(salesStats.realizedProfit),salesStats.realizedProfit>=0?'#16a34a':'#dc2626'],
          ['💸 إجمالي الصرفيات',IQ(totalExpenses),'#dc2626'],
          ['🔢 عدد الأصناف',products.length+' صنف','#7c3aed'],
          ['📋 وحدات في المخزن',totalUnits+' وحدة','#0369a1'],
        ].map(([lbl,val,col])=>(
          <div key={lbl} className="stat-card"><div className="stat-card-val" style={{color:col,...F}}>{val}</div><div className="stat-card-lbl" style={F}>{lbl}</div></div>
        ))}
      </div>

      <div className={`profit-banner${netProfit<0?' loss':''}`} style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,opacity:.75,marginBottom:4,...F}}>
            💹 صافي الربح / الخسارة (بعد البيع والصرفيات){(profitDateFrom||profitDateTo||profitCat)?<span style={{marginRight:6,background:'rgba(255,255,255,.2)',borderRadius:6,padding:'1px 7px',fontSize:10}}>مفلتر</span>:''}

        </div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          {[
            ['ربح إجمالي',salesStats.realizedProfit,'#86efac'],
            ['صرفيات',totalExpenses,'#fca5a5'],

          ].map(([lbl,val,col])=>(
            <div key={lbl} style={{background:'rgba(255,255,255,.1)',borderRadius:9,padding:'9px 13px',minWidth:120}}>
              <div style={{fontSize:18,fontWeight:900,color:col,...F}}>{fmt(val)}</div>
              <div style={{fontSize:9,opacity:.65,marginTop:2,...F}}>{lbl} — د.ع</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'flex',gap:4,margin:'14px 0',flexWrap:'wrap',alignItems:'center'}}>

                      style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,fontWeight:600,outline:'none',...F}}/>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginTop:10}}>
                {newProd.sell_price&&newProd.cost_price&&(
                  <div style={{padding:'5px 12px',borderRadius:20,fontSize:12,fontWeight:800,
                    background:(Number(newProd.sell_price)-Number(newProd.cost_price))>=0?'#f0fdf4':'#fef2f2',
                    color:(Number(newProd.sell_price)-Number(newProd.cost_price))>=0?'#16a34a':'#dc2626',...F}}>

              <div style={{fontSize:13,fontWeight:700,color:'#64748b',...F}}>
                {products.length} منتج · {totalUnits} وحدة إجمالاً

              <button onClick={()=>setShowAddForm(true)}

                <Icons.Plus/> إضافة منتج
              </button>
            </div>
          )}

          <div className="card" style={{padding:'10px 14px'}}>
            <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center',marginBottom:8}}>
              <input value={productSearch} onChange={e=>setProductSearch(e.target.value)}
                placeholder="🔍 بحث في المنتجات..."
                style={{flex:1,minWidth:180,padding:'6px 11px',border:'2px solid #e2e8f0',borderRadius:8,fontSize:13,fontWeight:600,outline:'none',...F}}/>
              {categories.length>0&&(
                <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}
                  style={{padding:'6px 10px',border:'2px solid #e2e8f0',borderRadius:7,fontSize:12,fontWeight:600,outline:'none',...F}}>
                  <option value="">كل الفئات</option>
                  {categories.map(ct=><option key={ct} value={ct}>{ct}</option>)}
                </select>
              )}
            </div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{fontSize:11,fontWeight:700,color:'#64748b',...F}}>ترتيب:</span>
              {[['name','الاسم'],['quantity','المخزون'],['sell_price','سعر البيع'],['cost_price','الكلفة'],['profit_unit','ربح الوحدة'],['margin','هامش%']].map(([col,lbl])=>(
                <button key={col} onClick={()=>toggleSort(col)}
                  style={{padding:'4px 9px',border:'1.5px solid',fontSize:11,fontWeight:700,cursor:'pointer',borderRadius:7,
                    borderColor:sortBy===col?'#2563eb':'#e2e8f0',background:sortBy===col?'#eff6ff':'#fff',color:sortBy===col?'#2563eb':'#64748b',...F}}>
                  {lbl}{sortBy===col?sortDir==='desc'?'↓':'↑':''}
                </button>
              ))}
              <span style={{marginRight:'auto',fontSize:11,color:'#94a3b8',fontWeight:600,...F}}>
                🔴 نفد · 🟡 منخفض (&lt;5) · 🟢 متوفر
              </span>
            </div>
          </div>

          <div className="card" style={{overflowX:'auto',padding:0,overflow:'hidden'}}>
            {sorted.length===0?(
              <div style={{textAlign:'center',padding:40,color:'#94a3b8',fontWeight:700,...F}}>لا توجد منتجات — أضف منتجاً أولاً</div>
            ):(
              <table className="rec-table" style={{fontSize:12}}>
                <thead><tr>
                  {['#','المنتج','الفئة','كلفة الشراء','سعر البيع','ربح الوحدة','هامش%','المخزون','تعديل المخزون','إجراء'].map(h=>(
                    <th key={h} style={{...F,whiteSpace:'nowrap',fontSize:11,padding:'10px 10px'}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {sorted.map((p,i)=>{
                    const isE=editId===p.id;
                    const qty=Number(p.quantity||0);
                    const stockColor=qty===0?'#dc2626':qty<5?'#d97706':'#16a34a';
                    const stockBg=qty===0?'#fef2f2':qty<5?'#fffbeb':'#f0fdf4';
                    const stockIcon=qty===0?'🔴':qty<5?'🟡':'🟢';
                    return(
                      <tr key={p.id} style={{borderBottom:'1px solid #f1f5f9'}}>
                        <td style={{color:'#94a3b8',fontSize:11,padding:'8px 10px',...F}}>{i+1}</td>
                        <td style={{textAlign:'right',fontWeight:800,padding:'8px 10px',...F}}>
                          {isE?<input value={editData.name} onChange={e=>setEditData(d=>({...d,name:e.target.value}))} className="edit-input" style={{width:130}}/>:p.name}
                        </td>
                        <td style={{color:'#64748b',fontSize:11,padding:'8px 10px',...F}}>
                          {isE?<input value={editData.category||''} onChange={e=>setEditData(d=>({...d,category:e.target.value}))} className="edit-input" style={{width:70}}/>:p.category||'—'}
                        </td>
                        <td style={{padding:'8px 10px',...F}}>
                          {isE?<input type="number" value={editData.cost_price} onChange={e=>setEditData(d=>({...d,cost_price:e.target.value}))} className="edit-input" style={{width:75,textAlign:'center'}}/>:fmt(p.cost_price)}
                        </td>
                        <td style={{fontWeight:700,padding:'8px 10px',...F}}>
                          {isE?<input type="number" value={editData.sell_price} onChange={e=>setEditData(d=>({...d,sell_price:e.target.value}))} className="edit-input" style={{width:75,textAlign:'center'}}/>:fmt(p.sell_price)}
                        </td>
                        <td style={{fontWeight:900,color:p.unitProfit>=0?'#16a34a':'#dc2626',padding:'8px 10px',...F}}>
                          {p.unitProfit>=0?'+':''}{fmt(p.unitProfit)}
                        </td>
                        <td style={{padding:'8px 10px'}}>
                          <span style={{padding:'2px 8px',borderRadius:99,background:p.margin>=20?'#f0fdf4':p.margin>0?'#fffbeb':'#fef2f2',color:p.margin>=20?'#16a34a':p.margin>0?'#d97706':'#dc2626',fontWeight:800,fontSize:10,...F}}>
                            {p.margin}%
                          </span>
                        </td>
                        <td style={{padding:'8px 10px'}}>
                          <div style={{display:'inline-flex',alignItems:'center',gap:4,background:stockBg,border:'1.5px solid',borderColor:stockColor+'33',borderRadius:9,padding:'3px 8px'}}>
                            <span style={{fontSize:11}}>{stockIcon}</span>
                            {isE
                              ?<input type="number" value={editData.quantity} onChange={e=>setEditData(d=>({...d,quantity:e.target.value}))} className="edit-input" style={{width:55,textAlign:'center',border:'none',background:'transparent',color:stockColor,fontWeight:900,fontSize:13}}/>
                              :<span style={{fontWeight:900,fontSize:13,color:stockColor,...F}}>{qty}</span>
                            }
                            <span style={{fontSize:9,color:stockColor,fontWeight:700,...F}}>وحدة</span>
                          </div>
                        </td>
                        <td style={{padding:'8px 8px'}}>
                          {!isE&&(
                            <div style={{display:'flex',gap:4,justifyContent:'center',alignItems:'center'}}>
                              <button onClick={()=>quickStock(p,-1)} title="خصم وحدة"
                                style={{width:24,height:24,border:'1.5px solid #fecaca',background:'#fef2f2',color:'#dc2626',borderRadius:6,cursor:'pointer',fontWeight:900,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                              <button onClick={()=>openStockModal(p)} title="تعديل المخزون"
                                style={{padding:'2px 7px',border:'1.5px solid #bfdbfe',background:'#eff6ff',color:'#2563eb',borderRadius:6,cursor:'pointer',fontWeight:700,fontSize:10,...F}}>تعديل</button>
                              <button onClick={()=>quickStock(p,1)} title="إضافة وحدة"
                                style={{width:24,height:24,border:'1.5px solid #bbf7d0',background:'#f0fdf4',color:'#16a34a',borderRadius:6,cursor:'pointer',fontWeight:900,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                            </div>
                          )}
                        </td>
                        <td style={{padding:'8px 8px'}}>
                          <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                            {isE?(
                              <>
                                <button onClick={saveEdit} style={{padding:'3px 8px',background:'#16a34a',color:'#fff',border:'none',borderRadius:5,cursor:'pointer',fontSize:11,fontWeight:700,...F}}>✓ حفظ</button>
                                <button onClick={()=>setEditId(null)} style={{padding:'3px 6px',background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',borderRadius:5,cursor:'pointer',fontSize:11}}>✕</button>

                              </>
                            )}
