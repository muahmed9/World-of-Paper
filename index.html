<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم ورق الكاشير - مولد الفواتير (A4)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 0;
        }
        /* قياس A4 للطباعة */
        .a4-container {
            width: 21cm;
            min-height: 29.7cm;
            background-color: white;
            padding: 1cm 1.5cm;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }
        /* لإظهار حدود الـ A4 في المتصفح */
        @media screen {
            #invoice-preview-container {
                padding: 1rem;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }
        /* عند الطباعة فقط */
        @media print {
            .no-print { display: none !important; }
            #app-root { display: block !important; }
            #invoice-preview-container { padding: 0 !important; display: block !important; }
            .a4-container { box-shadow: none !important; border: none !important; padding: 0.5cm !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // تعريف الأيقونات كـ SVG ثابتة لضمان العمل بدون مكتبات خارجية
        const Icons = {
            Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Printer: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        };

        const BUSINESS_INFO = {
            name: "عالم ورق الكاشير",
            slogan: "الجودة التي تستحقها تجارتكم",
            address: "بغداد - زيونة",
            phone: "+964 786 848 3823",
            logo: "https://i.imgur.com/u7FqC8K.png" // رابط صورة الشعار الثابتة
        };

        function App() {
            const [invoice, setInvoice] = useState({
                invoiceNumber: `INV-${Date.now().toString().slice(-6)}`,
                date: new Date().toISOString().split('T')[0],
                customerName: '',
                customerPhone: '',
                items: [{ id: '1', description: '', quantity: 1, price: 0 }],
                invoiceType: 'sale', // 'sale' أو 'receipt'
                paymentStatus: 'paid', // 'paid' أو 'unpaid'
            });

            const subtotal = useMemo(() => {
                return invoice.items.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            }, [invoice.items]);

            const addItem = () => {
                setInvoice(prev => ({
                    ...prev,
                    items: [...prev.items, { id: Math.random().toString(36).substr(2, 9), description: '', quantity: 1, price: 0 }]
                }));
            };

            const removeItem = (id) => {
                if (invoice.items.length === 1) return;
                setInvoice(prev => ({
                    ...prev,
                    items: prev.items.filter(item => item.id !== id)
                }));
            };

            const updateItem = (id, field, value) => {
                setInvoice(prev => ({
                    ...prev,
                    items: prev.items.map(item => item.id === id ? { ...item, [field]: value } : item)
                }));
            };

            return (
                <div id="app-root" className="min-h-screen flex flex-col md:flex-row gap-4 p-4 md:p-6 max-w-full">
                    
                    {/* قسم المدخلات (Form) - يختفي عند الطباعة */}
                    <div className="w-full md:w-[25%] lg:w-[22%] space-y-6 no-print bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h1 className="text-xl font-bold text-slate-800 border-b pb-4">تفاصيل الوصل</h1>
                        <div className="grid grid-cols-1 gap-4">
                            
                            {/* اختيار نوع الوصل */}
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-500">نوع القائمة</label>
                                <select value={invoice.invoiceType} onChange={e => setInvoice(prev => ({ ...prev, invoiceType: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="sale">قائمة بيع</option>
                                    <option value="receipt">سند قبض</option>
                                </select>
                            </div>

                            {/* اختيار حالة الدفع (تظهر فقط عند اختيار قائمة بيع) */}
                            {invoice.invoiceType === 'sale' && (
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500">حالة الدفع</label>
                                    <select value={invoice.paymentStatus} onChange={e => setInvoice(prev => ({ ...prev, paymentStatus: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="paid">واصل</option>
                                        <option value="unpaid">غير مدفوع</option>
                                    </select>
                                </div>
                            )}

                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-500">رقم القائمة</label>
                                <input type="text" value={invoice.invoiceNumber} onChange={e => setInvoice(prev => ({ ...prev, invoiceNumber: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-500">التاريخ</label>
                                <input type="date" value={invoice.date} onChange={e => setInvoice(prev => ({ ...prev, date: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <input type="text" placeholder="اسم الزبون" value={invoice.customerName} onChange={e => setInvoice(prev => ({ ...prev, customerName: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200" />
                            <input type="text" placeholder="رقم الهاتف" value={invoice.customerPhone} onChange={e => setInvoice(prev => ({ ...prev, customerPhone: e.target.value }))} className="w-full px-4 py-2 rounded-xl border border-slate-200" />
                        </div>

                        <div className="flex items-center justify-between pt-4">
                            <h2 className="font-bold">المواد</h2>
                            <button onClick={addItem} className="flex items-center gap-1 px-3 py-1.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors text-sm">
                                <Icons.Plus /> إضافة مادة
                            </button>
                        </div>

                        <div className="space-y-3 overflow-y-auto max-h-[40vh] pr-2">
                            {invoice.items.map((item) => (
                                <div key={item.id} className="flex flex-wrap gap-2 p-3 bg-slate-50 rounded-xl border border-slate-100 items-center">
                                    <input type="text" placeholder="الوصف" value={item.description} onChange={e => updateItem(item.id, 'description', e.target.value)} className="flex-1 px-3 py-1.5 border rounded-lg text-sm" />
                                    <input type="number" placeholder="الكمية" value={item.quantity} onChange={e => updateItem(item.id, 'quantity', Number(e.target.value))} className="w-16 px-3 py-1.5 border rounded-lg text-sm" />
                                    <input type="number" placeholder="السعر" value={item.price} onChange={e => updateItem(item.id, 'price', Number(e.target.value))} className="w-20 px-3 py-1.5 border rounded-lg text-sm" />
                                    <button onClick={() => removeItem(item.id)} className="text-slate-400 hover:text-red-500 p-1">
                                        <Icons.Trash />
                                    </button>
                                </div>
                            ))}
                        </div>

                        <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-2 py-3 bg-slate-900 text-white rounded-2xl hover:bg-slate-800 transition-all font-bold shadow-lg">
                            <Icons.Printer /> طباعة القائمة
                        </button>
                    </div>

                    {/* قسم المعاينة (Preview) - قياس A4 */}
                    <div id="invoice-preview-container" className="w-full md:w-[75%] lg:w-[78%]">
                        <div id="invoice-preview" className="a4-container flex flex-col">
                            <div className="flex-grow space-y-8">
                                
                                {/* الرأس - تصميم يطابق الصورة */}
                                <div className="text-center pb-8">
                                    <img src={BUSINESS_INFO.logo} alt="شعار الشاطر" className="w-16 h-16 mx-auto mb-2" />
                                    <h1 className="text-3xl font-black text-slate-900">{BUSINESS_INFO.name}</h1>
                                    <p className="text-blue-600 font-bold text-lg">{BUSINESS_INFO.slogan}</p>
                                    <p className="text-slate-600 text-sm mt-2 font-medium">{BUSINESS_INFO.address} | {BUSINESS_INFO.phone}</p>
                                </div>

                                {/* معلومات الزبون والفاتورة - تصميم يطابق الصورة */}
                                <div className="grid grid-cols-2 gap-8 border-t-2 border-b-2 border-slate-900 py-6">
                                    <div className="space-y-1">
                                        <p className="font-bold border-b border-slate-100 text-lg">إلى السيد: {invoice.customerName || '....................'}</p>
                                        <p className="font-bold border-b border-slate-100 text-lg mt-2">الهاتف: {invoice.customerPhone || '....................'}</p>
                                    </div>
                                    <div className="text-left space-y-1">
                                        <p className="font-bold text-lg">رقم القائمة: {invoice.invoiceNumber || '....................'}</p>
                                        <p className="font-bold text-lg mt-2">التاريخ: {invoice.date || '....................'}</p>
                                    </div>
                                </div>

                                {/* عنوان الوصل الديناميكي - جديد بناءً على الطلب */}
                                <div className="text-center mt-6">
                                    <h2 className="text-2xl font-black uppercase text-slate-900">
                                        {invoice.invoiceType === 'sale' 
                                            ? `قائمة بيع - ${invoice.paymentStatus === 'paid' ? 'واصل' : 'غير مدفوع'}` 
                                            : 'سند قبض'}
                                    </h2>
                                </div>

                                {/* الجدول - تصميم يطابق الصورة */}
                                <table className="w-full text-right border-collapse border-2 border-slate-900">
                                    <thead>
                                        <tr className="bg-slate-900 text-white">
                                            <th className="p-3 border border-slate-700 text-center w-12">#</th>
                                            <th className="p-3 border border-slate-700">المادة</th>
                                            <th className="p-3 border border-slate-700 text-center">الكمية</th>
                                            <th className="p-3 border border-slate-700 text-center">السعر</th>
                                            <th className="p-3 border border-slate-700 text-center">المجموع</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {invoice.items.map((item, i) => (
                                            <tr key={item.id} className="border-b border-slate-200">
                                                <td className="p-3 text-center border-l border-slate-200">{i + 1}</td>
                                                <td className="p-3 border-l border-slate-200 font-medium">{item.description || '---'}</td>
                                                <td className="p-3 text-center border-l border-slate-200">{item.quantity}</td>
                                                <td className="p-3 text-center border-l border-slate-200">{item.price.toLocaleString()}</td>
                                                <td className="p-3 text-center font-bold">{(item.quantity * item.price).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                {/* المجموع الكلي - تصميم يطابق الصورة */}
                                <div className="flex justify-end pt-4">
                                    <div className="w-1/2 bg-slate-900 text-white p-4 rounded-xl flex justify-between items-center shadow-lg">
                                        <span className="font-bold">المجموع الكلي:</span>
                                        <span className="text-xl font-black">{subtotal.toLocaleString()} د.ع</span>
                                    </div>
                                </div>
                            </div>
                            
                            {/* أقسام التواقيع - تصميم يطابق الصورة */}
                            <div className="pt-12 flex justify-between items-end border-t border-slate-100 mt-8">
                                <div className="text-center w-40">
                                    <div className="border-b-2 border-slate-900 h-10 mb-2"></div>
                                    <p className="font-bold text-lg">توقيع المستلم:</p>
                                </div>
                                <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest no-print">نظام عالم ورق الكاشير A4 الذكي</p>
                                <div className="text-center w-40">
                                    <div className="border-b-2 border-slate-900 h-10 mb-2"></div>
                                    <p className="font-bold text-lg">توقيع المحاسب:</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
