<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم ورق الكاشير - مولد الفواتير</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #0f172a; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; }
            #invoice-preview { box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        
        // إصلاح: استدعاء الأيقونات من كائن lucide مباشرة لتجنب خطأ التعريف
        const { 
            Plus, Trash2, Printer, Phone, MapPin, Calendar, 
            User, FileText, Package, Hash 
        } = lucide;

        const BUSINESS_INFO = {
            name: "عالم ورق الكاشير",
            slogan: "الجودة التي تستحقها تجارتكم",
            address: "بغداد - زيونة",
            phone: "+964 786 848 3823",
        };

        function App() {
            const [invoice, setInvoice] = useState({
                invoiceNumber: `INV-${Date.now().toString().slice(-6)}`,
                date: new Date().toISOString().split('T')[0],
                customerName: '',
                customerPhone: '',
                items: [{ id: '1', description: '', quantity: 1, price: 0 }],
                notes: '',
            });

            const subtotal = useMemo(() => {
                return invoice.items.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            }, [invoice.items]);

            const addItem = () => {
                setInvoice(prev => ({
                    ...prev,
                    items: [...prev.items, { id: Math.random().toString(36).substr(2, 9), description: '', quantity: 1, price: 0 }]
                }));
            };

            const removeItem = (id) => {
                if (invoice.items.length === 1) return;
                setInvoice(prev => ({
                    ...prev,
                    items: prev.items.filter(item => item.id !== id)
                }));
            };

            const updateItem = (id, field, value) => {
                setInvoice(prev => ({
                    ...prev,
                    items: prev.items.map(item => item.id === id ? { ...item, [field]: value } : item)
                }));
            };

            return (
                <div className="min-h-screen flex flex-col lg:flex-row gap-8 p-4 md:p-8 max-w-7xl mx-auto">
                    <div className="w-full lg:w-1/2 space-y-6 no-print">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                            <h1 className="text-xl font-bold flex items-center gap-2"><FileText className="text-blue-600"/> تفاصيل القائمة</h1>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <input type="text" placeholder="رقم القائمة" value={invoice.invoiceNumber} onChange={e => setInvoice(prev => ({ ...prev, invoiceNumber: e.target.value }))} className="w-full px-4 py-2 border rounded-xl" />
                                <input type="date" value={invoice.date} onChange={e => setInvoice(prev => ({ ...prev, date: e.target.value }))} className="w-full px-4 py-2 border rounded-xl" />
                                <input type="text" placeholder="اسم الزبون" value={invoice.customerName} onChange={e => setInvoice(prev => ({ ...prev, customerName: e.target.value }))} className="w-full px-4 py-2 border rounded-xl" />
                                <input type="text" placeholder="رقم الهاتف" value={invoice.customerPhone} onChange={e => setInvoice(prev => ({ ...prev, customerPhone: e.target.value }))} className="w-full px-4 py-2 border rounded-xl" />
                            </div>
                            <div className="flex justify-between items-center">
                                <h2 className="font-bold">المواد</h2>
                                <button onClick={addItem} className="bg-blue-600 text-white px-4 py-2 rounded-xl flex items-center gap-2"><Plus size={16}/> إضافة</button>
                            </div>
                            {invoice.items.map(item => (
                                <div key={item.id} className="flex gap-2 bg-slate-50 p-2 rounded-lg">
                                    <input placeholder="الوصف" value={item.description} onChange={e => updateItem(item.id, 'description', e.target.value)} className="flex-1 p-2 border rounded" />
                                    <input type="number" placeholder="كمية" value={item.quantity} onChange={e => updateItem(item.id, 'quantity', Number(e.target.value))} className="w-20 p-2 border rounded" />
                                    <input type="number" placeholder="سعر" value={item.price} onChange={e => updateItem(item.id, 'price', Number(e.target.value))} className="w-24 p-2 border rounded" />
                                    <button onClick={() => removeItem(item.id)} className="text-red-500"><Trash2/></button>
                                </div>
                            ))}
                            <button onClick={() => window.print()} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold flex justify-center gap-2"><Printer/> طباعة</button>
                        </div>
                    </div>

                    <div className="w-full lg:w-1/2 bg-white p-8 md:p-12 shadow-xl min-h-[29.7cm]" id="invoice-preview">
                        <div className="text-center border-b-2 border-slate-900 pb-6 mb-6">
                            <h1 className="text-3xl font-black">{BUSINESS_INFO.name}</h1>
                            <p className="text-blue-600 font-bold">{BUSINESS_INFO.slogan}</p>
                            <p className="text-sm mt-2">{BUSINESS_INFO.address} | {BUSINESS_INFO.phone}</p>
                        </div>
                        <div className="grid grid-cols-2 mb-8">
                            <div>
                                <p><strong>إلى السيد:</strong> {invoice.customerName || '..........'}</p>
                                <p><strong>الهاتف:</strong> {invoice.customerPhone || '..........'}</p>
                            </div>
                            <div className="text-left">
                                <p><strong>رقم القائمة:</strong> {invoice.invoiceNumber}</p>
                                <p><strong>التاريخ:</strong> {invoice.date}</p>
                            </div>
                        </div>
                        <table className="w-full text-right border-2 border-slate-900">
                            <thead className="bg-slate-900 text-white">
                                <tr>
                                    <th className="p-2 border">#</th>
                                    <th className="p-2 border">المادة</th>
                                    <th className="p-2 border">الكمية</th>
                                    <th className="p-2 border">السعر</th>
                                    <th className="p-2 border">المجموع</th>
                                </tr>
                            </thead>
                            <tbody>
                                {invoice.items.map((item, i) => (
                                    <tr key={item.id} className="border">
                                        <td className="p-2 border text-center">{i+1}</td>
                                        <td className="p-2 border">{item.description}</td>
                                        <td className="p-2 border text-center">{item.quantity}</td>
                                        <td className="p-2 border text-center">{item.price.toLocaleString()}</td>
                                        <td className="p-2 border text-center font-bold">{(item.quantity * item.price).toLocaleString()}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        <div className="mt-6 flex justify-end">
                            <div className="bg-slate-900 text-white p-4 rounded-xl w-1/2 flex justify-between">
                                <span>المجموع الكلي:</span>
                                <span className="font-black">{subtotal.toLocaleString()} د.ع</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
