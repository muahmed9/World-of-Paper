                  <div style={{fontSize:10,fontWeight:700,color:'#64748b',marginBottom:3,...F}}>من تاريخ</div>
                  <input type="date" value={profitDateFrom} onChange={e=>setProfitDateFrom(e.target.value)}
                    style={{padding:'6px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:12,fontWeight:600,outline:'none',...F}}/>
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:'#64748b',marginBottom:3,...F}}>إلى تاريخ</div>
                  <input type="date" value={profitDateTo} onChange={e=>setProfitDateTo(e.target.value)}
                    style={{padding:'6px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:12,fontWeight:600,outline:'none',...F}}/>
                </div>
                {categories.length>0&&(
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:'#64748b',marginBottom:3,...F}}>الفئة</div>
                    <select value={profitCat} onChange={e=>setProfitCat(e.target.value)}
                      style={{padding:'6px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:12,fontWeight:600,outline:'none',...F}}>
                      <option value="">كل الفئات</option>
                      {categories.map(ct=><option key={ct} value={ct}>{ct}</option>)}
                    </select>
                  </div>
                )}
                {(profitDateFrom||profitDateTo||profitCat)&&(
                  <button onClick={()=>{setProfitDateFrom('');setProfitDateTo('');setProfitCat('');}}
                    style={{padding:'6px 14px',background:'#fef2f2',color:'#dc2626',border:'1px solid #fecaca',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer',...F}}>
                    ✕ مسح الفلاتر
                  </button>
                )}
                {(profitDateFrom||profitDateTo)&&(
                  <div style={{padding:'6px 12px',background:'#eff6ff',borderRadius:8,border:'1px solid #bfdbfe',fontSize:11,fontWeight:700,color:'#2563eb',...F}}>
                    📅 {profitDateFrom||'البداية'} ← {profitDateTo||'اليوم'}
                  </div>
                )}
              </div>
            </div>
          </div>
          <div className="card" style={{minWidth:260,flex:1}}>
            <div style={{fontWeight:900,fontSize:14,color:'#1a2744',marginBottom:13,...F}}>🧮 معادلة الحساب الدقيق</div>
            {[
              ['إجمالي إيرادات البيع', salesStats.totalRevenue,'#2563eb',false],
              ['— تكلفة البضاعة المباعة (فعلي)', salesStats.totalCOGS,'#64748b',false],
              ['= ربح إجمالي بعد البيع', salesStats.realizedProfit, salesStats.realizedProfit>=0?'#16a34a':'#dc2626',true],
              ['— إجمالي الصرفيات', totalExpenses,'#dc2626',false],
              ['= صافي الربح / الخسارة', netProfit, netProfit>=0?'#16a34a':'#dc2626',true],
            ].map(([lbl,val,col,bold])=>(
              <div key={lbl} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 11px',marginBottom:4,
                background:bold?'#f8fafc':'#fff',border:bold?'2px solid '+col:'1px solid #f1f5f9',borderRadius:9}}>
                <span style={{fontSize:12,fontWeight:bold?800:700,color:'#374151',...F}}>{lbl}</span>
                <span style={{fontSize:bold?16:13,fontWeight:900,color:col,...F}}>{fmt(val)} <small style={{fontSize:9,opacity:.6}}>د.ع</small></span>
              </div>
            ))}
            <div style={{marginTop:10,background:'#f0fdf4',borderRadius:9,padding:'9px 11px',border:'1px solid #bbf7d0'}}>
              <div style={{fontSize:10,color:'#16a34a',fontWeight:800,marginBottom:3,...F}}>✅ الأرقام دقيقة 100%</div>
              <div style={{fontSize:11,color:'#166534',fontWeight:600,lineHeight:1.8,...F}}>
                الربح محسوب من سعر البيع الفعلي في كل قائمة ناقص تكلفة الشراء المسجلة لكل مادة.
              </div>
            </div>
          </div>

          <div className="card" style={{flex:2,overflowX:'auto',minWidth:300}}>
            <div style={{fontWeight:900,fontSize:14,color:'#1a2744',marginBottom:13,...F}}>🏆 المواد حسب الربح المحقق بعد البيع</div>
            {Object.keys(salesStats.byName).length===0?(
              <div style={{textAlign:'center',padding:40,color:'#94a3b8',fontWeight:700,...F}}>📭 لا توجد مبيعات بعد</div>
            ):(
              <table className="rec-table">
                <thead><tr>
                  {['#','المادة','كمية مباعة','إيراد','تكلفة المباع','ربح محقق'].map(h=><th key={h} style={{...F,fontSize:10}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {Object.entries(salesStats.byName)
                    .sort((a,b)=>b[1].profit-a[1].profit)
                    .map(([name,s],i)=>(
                      <tr key={name}>
                        <td style={{color:'#94a3b8',fontWeight:700,fontSize:11,...F}}>#{i+1}</td>
                        <td style={{fontWeight:800,textAlign:'right',...F}}>{name}</td>
                        <td style={{color:'#0369a1',fontWeight:700,...F}}>{fmt(s.qty_sold)}</td>
                        <td style={{fontWeight:700,...F}}>{fmt(s.revenue)}</td>
                        <td style={{color:'#64748b',...F}}>{fmt(s.cogs)}</td>
                        <td>
                          <span style={{display:'inline-block',padding:'2px 10px',borderRadius:99,fontSize:12,fontWeight:900,
                            background:s.profit>0?'#f0fdf4':s.profit<0?'#fef2f2':'#f8fafc',
                            color:s.profit>0?'#16a34a':s.profit<0?'#dc2626':'#94a3b8',...F}}>
                            {s.profit>0?'+':''}{fmt(s.profit)} د.ع
                          </span>
                        </td>
                      </tr>
                    ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {/* Stock Modal */}
      {stockModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9000,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setStockModal(null)}>
          <div style={{background:'#fff',borderRadius:16,padding:28,width:280,boxShadow:'0 20px 60px rgba(0,0,0,.3)'}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:15,color:'#1a2744',marginBottom:4,fontFamily:'Cairo,sans-serif'}}>{stockModal.product.name}</div>
            <div style={{fontSize:12,color:'#64748b',marginBottom:16,fontFamily:'Cairo,sans-serif'}}>تحديث كمية المخزون</div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,justifyContent:'center'}}>
              <button onClick={()=>setStockModal(s=>({...s,inputVal:String(Math.max(0,Number(s.inputVal||0)-1))}))}
                style={{width:36,height:36,border:'2px solid #fecaca',background:'#fef2f2',color:'#dc2626',borderRadius:9,cursor:'pointer',fontWeight:900,fontSize:18}}>−</button>
              <input type="number" value={stockModal.inputVal} onChange={e=>setStockModal(s=>({...s,inputVal:e.target.value}))} min="0"
                style={{width:90,textAlign:'center',padding:'8px',border:'2px solid #bfdbfe',borderRadius:9,fontSize:22,fontWeight:900,color:'#1a2744',fontFamily:'Cairo,sans-serif',outline:'none'}}/>
              <button onClick={()=>setStockModal(s=>({...s,inputVal:String(Number(s.inputVal||0)+1)}))}
                style={{width:36,height:36,border:'2px solid #bbf7d0',background:'#f0fdf4',color:'#16a34a',borderRadius:9,cursor:'pointer',fontWeight:900,fontSize:18}}>+</button>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={saveStockModal} style={{flex:1,padding:'10px',background:'#1a2744',color:'#fff',border:'none',borderRadius:9,fontWeight:800,fontSize:13,cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>حفظ</button>
              <button onClick={()=>setStockModal(null)} style={{padding:'10px 16px',background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',borderRadius:9,fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>إلغاء</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════
   NEW: CustomersView — العملاء والديون
   يعرض ديون الزبائن ويتيح تسجيل الدفعات
   وتصدير كشف حساب PDF لكل زبون
══════════════════════════════════════ */
function CustomersView(){
  const F={fontFamily:'Cairo,sans-serif'};
  const [invoices,   setInvoices]   = useState([]);
  const [payments,   setPayments]   = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [selected,   setSelected]   = useState(null); // اسم الزبون المحدد
  const [payForm,    setPayForm]    = useState({amount:'',date:todayDate,notes:''});
  const [saving,     setSaving]     = useState(false);
  const [showStmt,   setShowStmt]   = useState(null); // بيانات كشف الحساب

  useEffect(()=>{loadAll();},[]);

  const loadAll=async()=>{
    setLoading(true);
    const [inv,pay]=await Promise.all([
      sb.from('invoices').select('*').eq('invoice_type','sale').order('date'),
      sb.from('customer_payments').select('*').order('date'),
    ]);
    setInvoices(inv.data||[]);
    setPayments(pay.data||[]);
    setLoading(false);
  };

  /* تجميع بيانات الزبائن من الفواتير والدفعات */
  const customers=useMemo(()=>{
    const map={};
    // جمع الفواتير
    (invoices||[]).forEach(inv=>{
      const name=(inv.customer_name||'').trim()||'غير محدد';
      if(!map[name])map[name]={invoices:[],payments:[],totalInvoiced:0,initialPaid:0,totalDueFromInv:0};
      map[name].invoices.push(inv);
      map[name].totalInvoiced+=Number(inv.subtotal||0);
      map[name].initialPaid+=Number(inv.paid_amount||0);
      map[name].totalDueFromInv+=Number(inv.due_amount||0);
    });
    // جمع دفعات التسديد اللاحقة
    (payments||[]).forEach(pay=>{
      const name=(pay.customer_name||'').trim();
      if(!map[name])map[name]={invoices:[],payments:[],totalInvoiced:0,initialPaid:0,totalDueFromInv:0};
      map[name].payments.push(pay);
    });
    return Object.entries(map).map(([name,data])=>{
      const additionalPaid=data.payments.reduce((s,p)=>s+Number(p.amount||0),0);
      const netDue=Math.max(0,data.totalDueFromInv-additionalPaid);
      return{name,...data,additionalPaid,netDue};
    }).filter(c=>c.invoices.length>0) // فقط من لديه فواتير
      .sort((a,b)=>b.netDue-a.netDue);
  },[invoices,payments]);

  /* إضافة دفعة تسديد */
  const addPayment=async()=>{
    if(!selected){toast('اختر زبوناً أولاً','error');return;}
    if(!payForm.amount||Number(payForm.amount)<=0){toast('أدخل مبلغاً صحيحاً','error');return;}
    setSaving(true);
    const{error}=await sb.from('customer_payments').insert({
      customer_name:selected,
      amount:Number(payForm.amount),
      date:payForm.date,
      notes:payForm.notes||''
    });
    if(error){toast('فشل الحفظ: '+error.message,'error');}
    else{toast('✅ تم تسجيل الدفعة','success');setPayForm({amount:'',date:todayDate,notes:''});loadAll();}
    setSaving(false);
  };

  /* حذف دفعة */
  const delPayment=async id=>{
    if(!confirm('حذف هذه الدفعة؟'))return;
    await sb.from('customer_payments').delete().eq('id',id);
    toast('تم الحذف','success');loadAll();
  };

  /* تصدير كشف حساب PDF */
  const exportStatement=async(customer)=>{
    showLoading('جاري إنشاء كشف الحساب...');
    try{
      const el=document.getElementById('statement-print-area');
      const allAdditionalPayments=(payments||[]).filter(p=>p.customer_name===customer.name);

      el.innerHTML=`
        <div style="font-family:'Cairo',sans-serif;direction:rtl;color:#0f172a;">
          <!-- رأس الكشف -->
          <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #1a2744;padding-bottom:14px;margin-bottom:18px;">
            <div>
              <div style="font-size:24px;font-weight:900;color:#1a2744;">عالم ورق الكاشير</div>
              <div style="font-size:11px;color:#2563eb;font-weight:700;margin-top:3px;">كشف حساب زبون</div>
            </div>
            <div style="text-align:left;direction:ltr;">
              <div style="font-size:11px;color:#64748b;">التاريخ: ${todayDate}</div>
              <div style="font-size:11px;color:#64748b;">بغداد — زيونة</div>
            </div>
          </div>
          <!-- معلومات الزبون -->
          <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px 18px;margin-bottom:18px;">
            <div style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:4px;">اسم الزبون / العميل</div>
            <div style="font-size:22px;font-weight:900;color:#1a2744;">${customer.name}</div>
            <div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;">
              <div style="background:#eff6ff;border-radius:8px;padding:8px 14px;text-align:center;">
                <div style="font-size:16px;font-weight:900;color:#2563eb;">${fmt(customer.totalInvoiced)} د.ع</div>
                <div style="font-size:10px;color:#64748b;font-weight:700;">إجمالي الفواتير</div>
              </div>
              <div style="background:#f0fdf4;border-radius:8px;padding:8px 14px;text-align:center;">
                <div style="font-size:16px;font-weight:900;color:#16a34a;">${fmt(customer.initialPaid+customer.additionalPaid)} د.ع</div>
                <div style="font-size:10px;color:#64748b;font-weight:700;">إجمالي المدفوع</div>
              </div>
              <div style="background:${customer.netDue>0?'#fef2f2':'#f0fdf4'};border-radius:8px;padding:8px 14px;text-align:center;border:2px solid ${customer.netDue>0?'#fecaca':'#bbf7d0'};">
                <div style="font-size:16px;font-weight:900;color:${customer.netDue>0?'#dc2626':'#16a34a'};">${fmt(customer.netDue)} د.ع</div>
                <div style="font-size:10px;color:#64748b;font-weight:700;">${customer.netDue>0?'المتبقي بالذمة':'مسدد بالكامل ✅'}</div>
              </div>
            </div>
          </div>
          <!-- جدول الفواتير -->
          <div style="margin-bottom:20px;">
            <div style="font-size:13px;font-weight:900;color:#1a2744;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #e2e8f0;">📋 الفواتير (${customer.invoices.length})</div>
            <table style="width:100%;border-collapse:collapse;font-size:11px;">
              <thead>
                <tr style="background:#1a2744;">
                  ${['رقم الوصل','التاريخ','المجموع','مدفوع','متبقي'].map(h=>`<th style="color:#fff;padding:7px 10px;font-weight:800;text-align:center;">${h}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${customer.invoices.map((inv,i)=>`
                  <tr style="background:${i%2===0?'#fff':'#f8fafc'};border-bottom:1px solid #e2e8f0;">
                    <td style="padding:7px 10px;text-align:center;font-weight:800;color:#1a2744;">#${inv.invoice_number}</td>
                    <td style="padding:7px 10px;text-align:center;color:#64748b;">${inv.date}</td>
                    <td style="padding:7px 10px;text-align:center;font-weight:700;">${fmt(inv.subtotal)}</td>
                    <td style="padding:7px 10px;text-align:center;color:#16a34a;font-weight:700;">${fmt(inv.paid_amount)}</td>
                    <td style="padding:7px 10px;text-align:center;font-weight:900;color:${Number(inv.due_amount)>0?'#dc2626':'#16a34a'};">${fmt(inv.due_amount)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          <!-- جدول الدفعات اللاحقة -->
          ${allAdditionalPayments.length>0?`
          <div style="margin-bottom:20px;">
            <div style="font-size:13px;font-weight:900;color:#16a34a;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #bbf7d0;">💰 دفعات التسديد (${allAdditionalPayments.length})</div>
            <table style="width:100%;border-collapse:collapse;font-size:11px;">
              <thead>
                <tr style="background:#16a34a;">
                  ${['التاريخ','المبلغ','ملاحظات'].map(h=>`<th style="color:#fff;padding:7px 10px;font-weight:800;text-align:center;">${h}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${allAdditionalPayments.map((p,i)=>`
                  <tr style="background:${i%2===0?'#fff':'#f0fdf4'};border-bottom:1px solid #e2e8f0;">
                    <td style="padding:7px 10px;text-align:center;color:#64748b;">${p.date}</td>
                    <td style="padding:7px 10px;text-align:center;font-weight:900;color:#16a34a;">${fmt(p.amount)} د.ع</td>
                    <td style="padding:7px 10px;text-align:center;color:#475569;">${p.notes||'—'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>`:''}
          <!-- التذييل -->
          <div style="background:#1a2744;border-radius:8px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:auto;">
            <span style="color:#fff;font-weight:800;font-size:12px;direction:ltr;">+964 786 848 3823</span>
            <span style="color:#93c5fd;font-weight:900;font-size:13px;">عالم ورق الكاشير</span>
            <span style="color:#fff;font-weight:800;font-size:12px;">بغداد — زيونة</span>
          </div>
        </div>
      `;

      await html2pdf().set({
        margin:10,
        filename:`كشف_حساب_${customer.name}_${todayDate}.pdf`,
        image:{type:'jpeg',quality:.98},
        html2canvas:{scale:2,useCORS:true,logging:false,backgroundColor:'#ffffff'},
        jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
      }).from(el).save();

      toast('✅ تم تصدير كشف الحساب PDF','success');
    }catch(e){
      console.error(e);
      toast('فشل التصدير','error');
    }
    hideLoading();
  };

  const selectedCustomer=customers.find(c=>c.name===selected);
  const totalDebt=customers.reduce((s,c)=>s+c.netDue,0);
  const debtorCount=customers.filter(c=>c.netDue>0).length;

  return(
    <div className="full-tab">
      {/* ══ ملخص عام ══ */}
      <div className="stats-grid" style={{marginBottom:14}}>
        {[
          ['👥 إجمالي العملاء',customers.length+' زبون','#1a2744'],
          ['🔴 زبائن بديون',debtorCount+' زبون','#dc2626'],
          ['💰 إجمالي الديون',IQ(totalDebt),totalDebt>0?'#dc2626':'#16a34a'],
          ['✅ الزبائن المسددون',(customers.length-debtorCount)+' زبون','#16a34a'],
        ].map(([lbl,val,col])=>(
          <div key={lbl} className="stat-card"><div className="stat-card-val" style={{color:col,...F}}>{val}</div><div className="stat-card-lbl" style={F}>{lbl}</div></div>
        ))}
      </div>

      <div style={{display:'flex',gap:14,alignItems:'flex-start',flexWrap:'wrap'}}>

        {/* ══ قائمة الزبائن ══ */}
        <div className="card" style={{flex:'2',minWidth:320,overflowX:'auto',padding:0,overflow:'hidden'}}>
          <div style={{padding:'14px 18px 10px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:900,fontSize:14,color:'#1a2744',...F}}>👥 كشف الحساب المجمع</span>
            <button onClick={loadAll} style={{display:'flex',alignItems:'center',gap:4,padding:'5px 11px',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:7,cursor:'pointer',fontSize:12,fontWeight:700,color:'#64748b',...F}}>
              <Icons.Refresh/> تحديث
            </button>
          </div>
          {loading?(
            <div style={{padding:40,textAlign:'center',color:'#94a3b8',fontWeight:700,...F}}>⏳ جاري التحميل...</div>
          ):customers.length===0?(
            <div style={{padding:40,textAlign:'center',color:'#94a3b8',fontWeight:700,...F}}>📭 لا توجد فواتير بعد</div>
          ):(
            <table className="rec-table">
              <thead><tr>
                {['#','اسم الزبون','الفواتير','إجمالي','مدفوع','متبقي بالذمة','إجراء'].map(h=>(
                  <th key={h} style={{...F,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {customers.map((c,i)=>(
                  <tr key={c.name} style={{background:selected===c.name?'#eff6ff':undefined}}>
                    <td style={{color:'#94a3b8',fontWeight:700,...F}}>{i+1}</td>
                    <td style={{fontWeight:800,textAlign:'right',...F}}>
                      <button onClick={()=>setSelected(selected===c.name?null:c.name)}
                        style={{border:'none',background:'transparent',cursor:'pointer',fontWeight:800,fontSize:13,color:selected===c.name?'#2563eb':'#1a2744',textDecoration:selected===c.name?'underline':'none',...F}}>
                        {c.name}
                      </button>
                    </td>
                    <td style={{color:'#64748b',...F}}>{c.invoices.length}</td>
                    <td style={{fontWeight:700,...F}}>{fmt(c.totalInvoiced)}</td>
                    <td style={{color:'#16a34a',fontWeight:700,...F}}>{fmt(c.initialPaid+c.additionalPaid)}</td>
                    <td>
                      <span style={{display:'inline-block',padding:'3px 10px',borderRadius:99,fontWeight:900,fontSize:12,
                        background:c.netDue>0?'#fef2f2':'#f0fdf4',
                        color:c.netDue>0?'#dc2626':'#16a34a',...F}}>
                        {c.netDue>0?fmt(c.netDue)+' د.ع':'مسدد ✅'}
                      </span>
                    </td>
                    <td>
                      <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                        <button onClick={()=>setSelected(selected===c.name?null:c.name)}
                          style={{padding:'3px 8px',background:'#eff6ff',color:'#2563eb',border:'none',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:700,...F}}>
                          {selected===c.name?'✕ إغلاق':'💳 دفعة'}
                        </button>
                        <button onClick={()=>exportStatement(c)}
                          style={{padding:'3px 8px',background:'#1a2744',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:2,...F}}>
                          <Icons.PDF/> كشف
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        {/* ══ لوحة إضافة دفعة ══ */}
        {selected&&selectedCustomer&&(
          <div style={{width:280,flexShrink:0,display:'flex',flexDirection:'column',gap:10}}>
            {/* ملخص الزبون المحدد */}
            <div className="card" style={{borderRight:'4px solid #2563eb',background:'#f0f7ff'}}>
              <div style={{fontWeight:900,fontSize:14,color:'#1a2744',marginBottom:8,...F}}>{selected}</div>
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {[
                  ['إجمالي الفواتير',fmt(selectedCustomer.totalInvoiced),'#1a2744'],
                  ['مدفوع مسبقاً',fmt(selectedCustomer.initialPaid),'#16a34a'],
                  ['دفعات إضافية',fmt(selectedCustomer.additionalPaid),'#0369a1'],
                  ['المتبقي الصافي',fmt(selectedCustomer.netDue),selectedCustomer.netDue>0?'#dc2626':'#16a34a'],
                ].map(([l,v,c])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid rgba(0,0,0,.05)'}}>
                    <span style={{fontSize:11,fontWeight:700,color:'#64748b',...F}}>{l}</span>
                    <span style={{fontSize:13,fontWeight:900,color:c,...F}}>{v} د.ع</span>
                  </div>
                ))}
              </div>
            </div>

            {/* فورم الدفعة */}
            <div className="card" style={{borderRight:'4px solid #16a34a'}}>
              <div style={{fontWeight:900,fontSize:13,color:'#16a34a',marginBottom:10,...F}}>💳 تسجيل دفعة تسديد</div>
              {[
                {ph:'المبلغ (د.ع) *',key:'amount',type:'number'},
                {ph:'التاريخ',key:'date',type:'date'},
                {ph:'ملاحظات',key:'notes',type:'text'},
              ].map(({ph,key,type})=>(
                <div key={key} style={{marginBottom:7}}>
                  <div style={{fontSize:10,fontWeight:700,color:'#64748b',marginBottom:3,...F}}>{ph}</div>
                  <input type={type} value={payForm[key]} onChange={e=>setPayForm(p=>({...p,[key]:e.target.value}))}
                    style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,fontWeight:600,outline:'none',...F}}/>
                </div>
              ))}
              <button onClick={addPayment} disabled={saving}
                style={{width:'100%',padding:'10px',background:saving?'#94a3b8':'#16a34a',color:'#fff',border:'none',borderRadius:9,fontWeight:800,fontSize:13,cursor:saving?'wait':'pointer',...F}}>
                {saving?'جاري الحفظ...':'✓ حفظ الدفعة'}
              </button>
            </div>

            {/* سجل دفعات الزبون */}
            {selectedCustomer.payments.length>0&&(
              <div className="card">
                <div style={{fontWeight:800,fontSize:12,color:'#1a2744',marginBottom:8,...F}}>سجل دفعاته ({selectedCustomer.payments.length})</div>
                {selectedCustomer.payments.map(p=>(
                  <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #f1f5f9'}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:900,color:'#16a34a',...F}}>{fmt(p.amount)} د.ع</div>
                      <div style={{fontSize:10,color:'#94a3b8',fontWeight:600,...F}}>{p.date} {p.notes?'· '+p.notes:''}</div>
                    </div>
                    <button onClick={()=>delPayment(p.id)}
                      style={{padding:'2px 6px',background:'#fef2f2',color:'#dc2626',border:'none',borderRadius:5,cursor:'pointer'}}>
                      <Icons.Trash/>
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* منطقة مخفية لطباعة كشف الحساب */}
      <div id="statement-print-area"></div>
    </div>
  );
}

/* ══════════════════════════════════════
   NEW: PurchasesView — قوائم الشراء
   إدخال فاتورة شراء من مورد مع أتمتة المخزون
   يحفظ في جدول purchases ويحدث products تلقائياً
══════════════════════════════════════ */
function PurchasesView(){
  const F={fontFamily:'Cairo,sans-serif'};
  const [purchases, setPurchases] = useState([]);
  const [products,  setProducts]  = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [showForm,  setShowForm]  = useState(false);
  const [viewDetail,setViewDetail]= useState(null); // فاتورة شراء لعرض تفاصيلها
  const [form,      setForm]      = useState({
    supplier_name:'',date:todayDate,notes:'',
    items:[{id:1,name:'',qty:'',price:''}]
  });

  useEffect(()=>{loadAll();},[]);

  const loadAll=async()=>{
    setLoading(true);
    const [pu,pr]=await Promise.all([
      sb.from('purchases').select('*').order('date',{ascending:false}),
      sb.from('products').select('id,name,quantity,cost_price').order('name'),
    ]);
    setPurchases(pu.data||[]);
    setProducts(pr.data||[]);
    setLoading(false);
  };

  const addItemRow=()=>{
    setForm(f=>({...f,items:[...f.items,{id:Date.now(),name:'',qty:'',price:''}]}));
  };
  const removeItemRow=id=>{
    setForm(f=>({...f,items:f.items.filter(it=>it.id!==id)}));
  };
  const updateItem=(id,field,val)=>{
    setForm(f=>({...f,items:f.items.map(it=>it.id===id?{...it,[field]:val}:it)}));
  };

  /* حفظ فاتورة الشراء مع تحديث المخزون */
  const savePurchase=async()=>{
    if(!form.supplier_name.trim()){toast('أدخل اسم المورد','error');return;}
    const validItems=form.items.filter(it=>it.name.trim()&&Number(it.qty)>0);
    if(!validItems.length){toast('أضف مادة واحدة على الأقل بكمية صحيحة','error');return;}

    showLoading('جاري حفظ فاتورة الشراء وتحديث المخزن...');
    try{
      const total=validItems.reduce((s,it)=>s+Number(it.qty)*Number(it.price||0),0);

      // حفظ فاتورة الشراء في جدول purchases
      const{error}=await sb.from('purchases').insert({
        supplier_name:form.supplier_name.trim(),
        date:form.date,
        items:validItems.map(it=>({name:it.name.trim(),qty:Number(it.qty),price:Number(it.price||0)})),
        total,
        notes:form.notes||''
      });
      if(error)throw error;

      // أتمتة المخزون: تحديث كميات المنتجات وسعر التكلفة
      const names=[...new Set(validItems.map(it=>it.name.trim()))];
      const{data:prods}=await sb.from('products').select('id,name,quantity,cost_price').in('name',names);

      if(prods&&prods.length>0){
        await Promise.all(prods.map(prod=>{
          const purchased=validItems.filter(it=>it.name.trim()===prod.name);
          const addedQty=purchased.reduce((s,it)=>s+Number(it.qty||0),0);
          const newQty=Number(prod.quantity||0)+addedQty;
          // تحديث سعر التكلفة إذا تم إدخاله
          const lastPrice=purchased.filter(it=>Number(it.price)>0).pop();
          const updateData={quantity:newQty};
          if(lastPrice)updateData.cost_price=Number(lastPrice.price);
          return sb.from('products').update(updateData).eq('id',prod.id);
        }));
      }

      // إخبار المستخدم إذا وُجدت مواد غير مسجلة في المخزون
      const foundNames=prods?prods.map(p=>p.name):[];
      const notFound=names.filter(n=>!foundNames.includes(n));
      if(notFound.length>0){
        toast(`⚠️ هذه المواد غير موجودة بالمخزون: ${notFound.join('، ')}. أضفها أولاً ثم حدّث.`,'');
      }else{
        toast('✅ تم حفظ فاتورة الشراء وتحديث المخزن','success');
      }

      setForm({supplier_name:'',date:todayDate,notes:'',items:[{id:1,name:'',qty:'',price:''}]});
      setShowForm(false);
      loadAll();
    }catch(e){
      console.error(e);
      toast('فشل الحفظ: '+e.message,'error');
    }
    hideLoading();
  };

  const delPurchase=async id=>{
    if(!confirm('حذف فاتورة الشراء؟ لن يتم عكس التغييرات على المخزون.'))return;
    await sb.from('purchases').delete().eq('id',id);
    toast('تم الحذف','success');loadAll();
  };

  const totalPurchasesValue=purchases.reduce((s,p)=>s+Number(p.total||0),0);

  return(
    <div className="full-tab">
      {/* ملخص */}
      <div className="stats-grid" style={{marginBottom:14}}>
        {[
          ['🧾 عدد فواتير الشراء',purchases.length+' فاتورة','#7c3aed'],
          ['💸 إجمالي قيمة المشتريات',IQ(totalPurchasesValue),'#d97706'],
          ['📦 عدد الموردين',[...new Set(purchases.map(p=>p.supplier_name))].length+' مورد','#0369a1'],
        ].map(([lbl,val,col])=>(
          <div key={lbl} className="stat-card"><div className="stat-card-val" style={{color:col,...F}}>{val}</div><div className="stat-card-lbl" style={F}>{lbl}</div></div>
        ))}
      </div>

      {/* شريط الإجراءات */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <h2 style={{fontWeight:900,fontSize:16,color:'#1a2744',margin:0,...F}}>قوائم الشراء والموردين</h2>
        <div style={{display:'flex',gap:7}}>
          <button onClick={loadAll} style={{display:'flex',alignItems:'center',gap:4,padding:'7px 13px',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:8,fontWeight:700,fontSize:12,cursor:'pointer',color:'#475569',...F}}>
            <Icons.Refresh/> تحديث
          </button>
          <button onClick={()=>{setShowForm(true);setViewDetail(null);}}
            style={{display:'flex',alignItems:'center',gap:5,padding:'8px 18px',background:'#7c3aed',color:'#fff',border:'none',borderRadius:8,fontWeight:800,fontSize:13,cursor:'pointer',...F}}>
            <Icons.Plus/> فاتورة شراء جديدة
          </button>
        </div>
      </div>

      {/* ══ فورم إضافة فاتورة شراء ══ */}
      {showForm&&(
        <div className="card" style={{marginBottom:14,borderRight:'4px solid #7c3aed'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{fontWeight:900,fontSize:14,color:'#7c3aed',...F}}>🧾 فاتورة شراء جديدة</span>
            <button onClick={()=>setShowForm(false)} style={{border:'none',background:'transparent',cursor:'pointer',color:'#94a3b8',fontSize:16}}>✕</button>
          </div>

          {/* بيانات الفاتورة */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:4,...F}}>اسم المورد *</div>
              <input value={form.supplier_name} onChange={e=>setForm(f=>({...f,supplier_name:e.target.value}))}
                placeholder="اسم الشركة أو المورد"
                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,fontWeight:600,outline:'none',...F}}/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:4,...F}}>التاريخ</div>
              <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,fontWeight:600,outline:'none',...F}}/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:4,...F}}>ملاحظات</div>
              <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                placeholder="اختياري"
                style={{width:'100%',padding:'8px 10px',border:'1.5px solid #e2e8f0',borderRadius:8,fontSize:13,fontWeight:600,outline:'none',...F}}/>
            </div>
          </div>

          {/* جدول المواد المشتراة */}
          <div style={{overflowX:'auto',marginBottom:10}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{background:'#7c3aed'}}>
                  {['#','اسم المادة','الكمية المشتراة','سعر الشراء (د.ع)','الإجمالي',''].map(h=>(
                    <th key={h} style={{color:'#fff',padding:'8px 10px',fontWeight:800,fontSize:11,textAlign:'center',fontFamily:'Cairo,sans-serif'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {form.items.map((item,i)=>{
                  const rowTotal=Number(item.qty||0)*Number(item.price||0);
                  return(
                    <tr key={item.id} style={{borderBottom:'1px solid #f1f5f9',background:i%2===0?'#fff':'#fafafa'}}>
                      <td style={{textAlign:'center',color:'#94a3b8',fontWeight:700,padding:'6px 8px',...F}}>{i+1}</td>
                      <td style={{padding:'4px 6px'}}>
                        {/* اقتراح أسماء من المخزون */}
                        <input list={`prod-list-${item.id}`} value={item.name}
                          onChange={e=>{
                            updateItem(item.id,'name',e.target.value);
                            // auto-fill cost_price from products
                            const prod=products.find(p=>p.name===e.target.value);
                            if(prod&&Number(prod.cost_price)>0)updateItem(item.id,'price',prod.cost_price);
                          }}
                          placeholder="اسم المادة"
                          style={{width:'100%',padding:'6px 8px',border:'1.5px solid #e2e8f0',borderRadius:7,fontSize:12,fontWeight:600,outline:'none',...F}}/>
                        <datalist id={`prod-list-${item.id}`}>
                          {products.map(p=><option key={p.id} value={p.name}/>)}
                        </datalist>
                      </td>
                      <td style={{padding:'4px 6px'}}>
                        <input type="number" value={item.qty} onChange={e=>updateItem(item.id,'qty',e.target.value)}
                          placeholder="0" min="0"
                          style={{width:'100%',padding:'6px 8px',border:'1.5px solid #e2e8f0',borderRadius:7,fontSize:12,fontWeight:700,outline:'none',textAlign:'center',...F}}/>
                      </td>
                      <td style={{padding:'4px 6px'}}>
                        <input type="number" value={item.price} onChange={e=>updateItem(item.id,'price',e.target.value)}
                          placeholder="0" min="0"
                          style={{width:'100%',padding:'6px 8px',border:'1.5px solid #e2e8f0',borderRadius:7,fontSize:12,fontWeight:700,outline:'none',textAlign:'center',...F}}/>
                      </td>
                      <td style={{textAlign:'center',fontWeight:900,color:rowTotal>0?'#7c3aed':'#94a3b8',padding:'6px 8px',...F}}>
                        {rowTotal>0?fmt(rowTotal):'-'}
                      </td>
                      <td style={{textAlign:'center',padding:'4px'}}>
                        <button onClick={()=>removeItemRow(item.id)}
                          style={{width:26,height:26,border:'none',background:'#fef2f2',color:'#dc2626',borderRadius:6,cursor:'pointer',fontSize:13}}>✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
            <button onClick={addItemRow}
              style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',background:'#f5f3ff',color:'#7c3aed',border:'1px dashed #c4b5fd',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:12,...F}}>
              <Icons.Plus/> إضافة صف
            </button>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{fontWeight:900,fontSize:15,color:'#7c3aed',...F}}>
                الإجمالي: {fmt(form.items.reduce((s,it)=>s+Number(it.qty||0)*Number(it.price||0),0))} د.ع
              </div>
              <button onClick={savePurchase}
                style={{display:'flex',alignItems:'center',gap:6,padding:'9px 22px',background:'#7c3aed',color:'#fff',border:'none',borderRadius:9,fontWeight:800,fontSize:13,cursor:'pointer',...F}}>
                <Icons.Save/> حفظ وتحديث المخزن
              </button>
            </div>
          </div>

          <div style={{marginTop:10,padding:'9px 12px',background:'#f5f3ff',borderRadius:8,border:'1px solid #ddd6fe',fontSize:11,color:'#6d28d9',fontWeight:700,...F}}>
            ⚡ عند الحفظ سيتم جمع الكميات تلقائياً على المخزن الحالي لكل مادة، وتحديث سعر التكلفة إذا تم إدخاله.
          </div>
        </div>
      )}

      {/* ══ سجل فواتير الشراء ══ */}
      <div className="card" style={{overflowX:'auto',padding:0,overflow:'hidden'}}>
        <div style={{padding:'14px 18px 10px',borderBottom:'1px solid #f1f5f9',fontWeight:900,fontSize:14,color:'#1a2744',...F}}>
          📋 سجل فواتير الشراء ({purchases.length})
        </div>
        {loading?(
          <div style={{padding:40,textAlign:'center',color:'#94a3b8',fontWeight:700,...F}}>⏳ جاري التحميل...</div>
        ):purchases.length===0?(
          <div style={{padding:40,textAlign:'center',color:'#94a3b8',fontWeight:700,...F}}>📭 لا توجد فواتير شراء بعد</div>
        ):(
          <table className="rec-table">
            <thead><tr>
              {['#','التاريخ','المورد','عدد الأصناف','الإجمالي','ملاحظات','إجراء'].map(h=>(
                <th key={h} style={{...F,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {purchases.map((p,i)=>(
                <tr key={p.id}>
                  <td style={{color:'#94a3b8',fontWeight:700,...F}}>{i+1}</td>
                  <td style={{color:'#64748b',fontSize:11,...F}}>{p.date}</td>
                  <td style={{fontWeight:800,textAlign:'right',...F}}>{p.supplier_name}</td>
                  <td style={{color:'#7c3aed',fontWeight:700,...F}}>{(p.items||[]).length} صنف</td>
                  <td style={{fontWeight:900,color:'#d97706',...F}}>{fmt(p.total)} د.ع</td>
                  <td style={{color:'#64748b',fontSize:11,...F}}>{p.notes||'—'}</td>
                  <td>
                    <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                      <button onClick={()=>setViewDetail(viewDetail?.id===p.id?null:p)}
                        style={{display:'inline-flex',alignItems:'center',gap:2,padding:'3px 8px',background:'#f5f3ff',color:'#7c3aed',border:'none',borderRadius:6,cursor:'pointer',fontSize:11,fontWeight:700,...F}}>
                        <Icons.Eye/> {viewDetail?.id===p.id?'إغلاق':'تفاصيل'}
                      </button>
                      <button onClick={()=>delPurchase(p.id)}
                        style={{padding:'3px 7px',background:'#fef2f2',color:'#dc2626',border:'none',borderRadius:6,cursor:'pointer'}}>
                        <Icons.Trash/>
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* ══ تفاصيل فاتورة الشراء ══ */}
      {viewDetail&&(
        <div className="card" style={{marginTop:12,borderRight:'4px solid #7c3aed'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontWeight:900,fontSize:14,color:'#7c3aed',...F}}>📦 تفاصيل فاتورة شراء — {viewDetail.supplier_name}</span>
            <span style={{fontSize:11,color:'#64748b',...F}}>{viewDetail.date}</span>
          </div>
          <table className="rec-table">
            <thead><tr>
              {['#','اسم المادة','الكمية','سعر الشراء (د.ع)','الإجمالي'].map(h=><th key={h} style={F}>{h}</th>)}
            </tr></thead>
            <tbody>
              {(viewDetail.items||[]).map((it,i)=>(
                <tr key={i}>
                  <td style={{color:'#94a3b8',...F}}>{i+1}</td>
                  <td style={{fontWeight:800,textAlign:'right',...F}}>{it.name}</td>
                  <td style={{color:'#0369a1',fontWeight:700,...F}}>{fmt(it.qty)}</td>
                  <td style={{fontWeight:700,...F}}>{fmt(it.price)} د.ع</td>
                  <td style={{fontWeight:900,color:'#7c3aed',...F}}>{fmt(it.qty*it.price)} د.ع</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{display:'flex',justifyContent:'flex-end',padding:'10px 12px 0',borderTop:'2px solid #e2e8f0',marginTop:4}}>
            <span style={{fontWeight:900,fontSize:15,color:'#7c3aed',...F}}>الإجمالي: {fmt(viewDetail.total)} د.ع</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ App ══ */
function App(){
  const [activeTab,setActiveTab]=useState('create');
  const [products,setProducts]=useState([]);
  const [loadedRow,setLoadedRow]=useState(null);

  useEffect(()=>{
    sb.from('products').select('name,sell_price,cost_price').order('name').then(({data})=>{if(data)setProducts(data);});
  },[]);

  const loadInvoice=row=>{setLoadedRow(row);setActiveTab('create');};

  return(
    <div id="root" style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <div className="app-header">
        <div className="app-logo">عالم ورق الكاشير<span>نظام الفواتير والمخزن</span></div>
        {/* ══ تبويبات الرأسية — تشمل التبويبات الجديدة ══ */}
        <div className="header-tabs">
          {[
            ['create',   <Icons.Create/>,   'إنشاء فاتورة'],
            ['records',  <Icons.Records/>,  'سجل الإصدارات'],
            ['inventory',<Icons.Store/>,    'المخزن والأرباح'],
            /* NEW */ ['customers',<Icons.Users/>,'العملاء والديون'],
            /* NEW */ ['purchases', <Icons.Cart/>, 'قوائم الشراء'],
          ].map(([tab,icon,lbl])=>(
            <button key={tab} className={`header-tab${activeTab===tab?' active':''}`} onClick={()=>setActiveTab(tab)}>
              {icon} {lbl}
            </button>
          ))}
        </div>
        <div className="header-badge"><div className="pulse-dot"/> متصل بالخادم</div>
      </div>
      <div className="app-body">
        {activeTab==='create'    &&<CreateView products={products} loadedRow={loadedRow} onLoadDone={()=>setLoadedRow(null)}/>}
        {activeTab==='records'   &&<RecordsView onLoadInvoice={loadInvoice} onSwitch={setActiveTab}/>}
        {activeTab==='inventory' &&<InventoryView/>}
        {/* ══ NEW VIEWS ══ */}
        {activeTab==='customers' &&<CustomersView/>}
        {activeTab==='purchases' &&<PurchasesView/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
